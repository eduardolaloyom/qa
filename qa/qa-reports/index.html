<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reportes QA Cowork — YOM</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container { max-width: 960px; margin: 0 auto; }
        header { color: white; margin-bottom: 28px; }
        header h1 { font-size: 2em; margin-bottom: 4px; }
        header p { opacity: 0.85; }
        .back-link {
            display: inline-block; color: rgba(255,255,255,0.8);
            text-decoration: none; margin-bottom: 16px; font-size: 0.9em;
        }
        .back-link:hover { color: white; }
        .card { background: white; border-radius: 14px; padding: 28px; box-shadow: 0 10px 40px rgba(0,0,0,0.18); }
        .reports-list { display: flex; flex-direction: column; gap: 12px; }
        .report-row {
            display: flex; align-items: center; gap: 16px;
            padding: 14px 16px; border: 1.5px solid #e5e7eb; border-radius: 10px;
            text-decoration: none; color: inherit; transition: border-color 0.2s;
        }
        .report-row:hover { border-color: #6366f1; }
        .report-info { flex: 1; }
        .report-client { font-weight: 700; color: #111827; }
        .report-date { font-size: 0.8em; color: #9ca3af; margin-top: 2px; }
        .report-modes { display: flex; gap: 5px; margin-top: 6px; }
        .mode-badge {
            font-size: 0.7em; font-weight: 700; padding: 2px 7px;
            border-radius: 99px; background: #f3f4f6; color: #374151;
        }
        .mode-badge.done { background: #d1fae5; color: #065f46; }
        .verdict {
            font-size: 0.8em; font-weight: 700; padding: 4px 12px; border-radius: 99px;
        }
        .verdict-listo { background: #d1fae5; color: #065f46; }
        .verdict-condiciones { background: #fef3c7; color: #92400e; }
        .verdict-bloqueado { background: #fee2e2; color: #991b1b; }
        .verdict-pending { background: #f3f4f6; color: #6b7280; }
        .score { font-size: 1.4em; font-weight: 800; color: #111827; min-width: 60px; text-align: right; }
        .score span { font-size: 0.55em; color: #9ca3af; }
        .empty { color: #9ca3af; text-align: center; padding: 40px 0; }
    </style>
</head>
<body>
<div class="container">
    <a href="../" class="back-link">← Dashboard principal</a>
    <header>
        <h1>📋 Reportes QA Cowork</h1>
        <p>Resultados de validación manual por cliente y fecha</p>
    </header>
    <div class="card">
        <div class="reports-list" id="reportsList">
            <div class="empty">Cargando...</div>
        </div>
    </div>
</div>
<script>
async function load() {
    const list = document.getElementById('reportsList');
    try {
        const r = await fetch('manifest.json?v=' + Date.now());
        const data = await r.json();
        const reports = (data.reports || []).sort((a, b) => b.date.localeCompare(a.date));
        if (!reports.length) {
            list.innerHTML = '<div class="empty">Sin reportes aún.<br>Ejecuta <code>/report-qa {CLIENTE} {FECHA}</code> en Claude Code para generar el primero.</div>';
            return;
        }
        list.innerHTML = reports.map(rep => {
            const vc = rep.verdict === 'LISTO' ? 'verdict-listo'
                : rep.verdict === 'CON CONDICIONES' ? 'verdict-condiciones'
                : rep.verdict === 'BLOQUEADO' ? 'verdict-bloqueado' : 'verdict-pending';
            const modes = ['A','B','C','D'].map(m =>
                `<span class="mode-badge ${(rep.modes_done||[]).includes(m)?'done':''}">${m}</span>`
            ).join('');
            const score = rep.score ? `<div class="score">${rep.score}<span>/100</span></div>` : '';
            return `<a class="report-row" href="${rep.file}">
                <div class="report-info">
                    <div class="report-client">${rep.client}</div>
                    <div class="report-date">${rep.date}</div>
                    <div class="report-modes">${modes}</div>
                </div>
                <span class="verdict ${vc}">${rep.verdict || 'En progreso'}</span>
                ${score}
            </a>`;
        }).join('');
    } catch {
        list.innerHTML = '<div class="empty">Sin reportes aún.</div>';
    }
}
load();
</script>
</body>
</html>
