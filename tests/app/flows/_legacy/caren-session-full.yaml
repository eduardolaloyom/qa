appId: ${APP_PACKAGE}
name: "CAREN: Sesión Completa (Flows 01-10, sin clearState)"
# Sesión completa sin limpiar estado Realm — no fuerza sync desde cero.
# Usar cuando la app ya tiene datos sincronizados (caso más común).
# Para sync limpio usar caren-session.yaml.
---

# ── Startup único ─────────────────────────────────────────────────────────────
- runFlow: caren/helpers-startup.yaml

# ── 01: Catálogo comercios disponibles ───────────────────────────────────────
- runFlow: caren/01-comercios-disponibles.yaml

# ── 02: Pedido completo (staging — se envía) ──────────────────────────────────
- runFlow: caren/02-pedido.yaml

# ── 03: Comercios bloqueados ──────────────────────────────────────────────────
- runFlow: caren/03-comercios-bloqueados.yaml

# ── 04: Verificación features ON/OFF ─────────────────────────────────────────
- runFlow: caren/04-features.yaml

# ── 05: Bug bloqueo crediticio / Tomador de Pedido ───────────────────────────
- runFlow: caren/05-bloqueado-tomador-pedido.yaml

# ── 06: Lista completa de comercios (scroll) ──────────────────────────────────
- runFlow: caren/06-lista-todos-comercios.yaml

# ── 07: Historial de pedidos ──────────────────────────────────────────────────
- runFlow: caren/07-historial-pedidos.yaml

# ── 08: Búsqueda en lista de comercios ───────────────────────────────────────
- runFlow: caren/08-busqueda-comercios.yaml

# ── 09: Datos del comercio (ficha, crédito) ───────────────────────────────────
- runFlow: caren/09-datos-comercio.yaml

# ── 10: Catálogo detallado (fotos, SKUs, tabs) ────────────────────────────────
- runFlow: caren/10-catalogo-detallado.yaml
