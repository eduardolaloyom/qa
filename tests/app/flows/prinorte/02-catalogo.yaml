appId: ${APP_PACKAGE}
name: "PRINORTE: 02 — Catálogo y productos"
# Tests: catálogo carga con productos, fotos visibles, badges de promo opcionales
# Related: checklist-puesta-en-marcha-app.md > V1-03
---
# Continúa desde el catálogo del comercio (post 01-comercios)
# Pantalla de llegada: puede ser "Tomador de Pedido" (con tabs Sugerencias/Mi pedido)
# o catálogo de productos directamente

# Esperar que cargue la pantalla
- waitForAnimationToEnd

# Si llegamos a "Tomador de Pedido" en tab Sugerencias sin productos,
# el catálogo real está disponible pero en otra vista — es información válida del emulador
# El tester verifica visualmente si los productos cargan en el device físico

# Esperar un botón Agregar o confirmar que estamos en vista de catálogo
- extendedWaitUntil:
    visible:
      text: ".*[Aa]gregar.*|.*[Ss]ugerencias.*|.*Tomador.*"
    timeout: 10000

# Verificar que hay indicador de unidades (UND, CJA, DIS, etc.)
- assertVisible:
    text: ".*UND.*|.*CJA.*|.*DIS.*|.*DP.*|.*SET.*|.*BLI.*"
    optional: true

# Verificar badge de promoción o beneficio si aplica
- assertVisible:
    text: ".*[Pp]romo.*|.*[Dd]escuento.*|.*%.*|.*[Bb]eneficio.*"
    optional: true

# Tomar screenshot para verificar visualmente que las fotos cargan
- takeScreenshot: /tmp/prinorte-catalogo

# Entrar al detalle del primer producto si hay botón Agregar
- tapOn:
    text: ".*[Aa]gregar.*"
    index: 0
    optional: true
