appId: ${APP_PACKAGE}
name: "PRINORTE: 09 — Cuentas bancarias"
# Tests: formulario de cuenta bancaria abre, selector de banco existe
# Related: checklist-puesta-en-marcha-app.md > V1-10
---
# Continúa desde datos del comercio (post 08-datos-comercio)
# Verifica que el formulario de "Agregar cuenta" abre y tiene los campos esperados

# Tap en "Agregar una nueva cuenta"
- tapOn:
    text: ".*[Aa]gregar.*[Cc]uenta.*|.*[Nn]ueva.*[Cc]uenta.*"

# Verificar que el formulario abrió
- extendedWaitUntil:
    visible:
      text: ".*[Ss]eleccionar.*[Bb]anco.*|.*[Bb]anco.*"
    timeout: 10000

# Tomar screenshot del formulario
- takeScreenshot: /tmp/prinorte-cuentas-form

# Verificar campos presentes (sin abrir dropdowns que compliquen la salida)
- assertVisible:
    text: ".*RUT.*|.*[Nn]ombre.*|.*[Tt]ipo.*[Cc]uenta.*|.*N[uú]mero.*"
    optional: true

# BUG CONOCIDO: selector banco puede no cargar opciones
- assertVisible:
    text: ".*Banco.*Estado.*|.*Banco.*Chile.*|.*Scotiabank.*|.*BCI.*"
    optional: true

# --- SALIDA DEL FORMULARIO ---
# resource-id: me.youorder.yomventas:id/close_dialog
# bounds Samsung físico (1080x2340): [944,23][1012,91]
# CLAVE: el botón cruza la status bar (~0-67px). %3 = y70 falla (gesture zone).
# Maestro acepta pixel coords sin %. "978,80" = bajo la gesture zone → VERIFIED.

# Intento 1: pixel coords verificados en Samsung físico 1080x2340
- tapOn:
    point: "978,80"
    optional: true
- waitForAnimationToEnd

# Intento 2: emulador / Pixel (X en toolbar normal, fuera de status bar)
- runFlow:
    when:
      visible:
        text: "Agregar cuenta nueva"
    commands:
      - tapOn:
          point: "93%,9%"
          optional: true
      - waitForAnimationToEnd

# Intento 3: variación emulador
- runFlow:
    when:
      visible:
        text: "Agregar cuenta nueva"
    commands:
      - tapOn:
          point: "93%,7%"
          optional: true
      - waitForAnimationToEnd

# Esperar que el modal termine de cerrarse
- waitForAnimationToEnd

# Navegar de vuelta al listado via tab COMERCIOS (más confiable que Backs)
- tapOn:
    text: "COMERCIOS"
    optional: true
- waitForAnimationToEnd

# Fallback: si COMERCIOS no está visible (modal sigue abierto), Backs adicionales
- runFlow:
    when:
      notVisible:
        text: "Listado de comercios"
    commands:
      - pressKey: Back
      - waitForAnimationToEnd
- runFlow:
    when:
      notVisible:
        text: "Listado de comercios"
    commands:
      - pressKey: Back
      - waitForAnimationToEnd
- runFlow:
    when:
      notVisible:
        text: "Listado de comercios"
    commands:
      - pressKey: Back
      - waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      text: "Listado de comercios"
    timeout: 20000
