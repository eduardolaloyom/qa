appId: ${APP_PACKAGE}
name: "PRINORTE: 05 — Crear comercio"
# Tests: botón crear visible, formulario abre, campos Email/Región presentes, Región carga opciones
# Related: checklist-puesta-en-marcha-app.md > V1-08
# ⚠️ STOP — no enviar formulario en producción
---
# Continúa desde lista de comercios (post 04-filtros)
# Verifica el formulario de creación de comercio (FEATURE_CREATE_COMMERCE = true)
# ⚠️ PRODUCCIÓN — Solo verificar formulario, NO enviar

# Verificar botón de creación visible
- assertVisible:
    text: ".*[Nn]uevo.*|.*[Cc]rear.*|.*\\+.*[Cc]liente.*|.*[Aa]gregar.*[Cc]omercio.*"

# Abrir formulario
- tapOn:
    text: ".*[Nn]uevo.*|.*[Cc]rear.*[Cc]omercio.*|.*[Aa]gregar.*[Cc]liente.*"
    optional: true
- extendedWaitUntil:
    visible:
      text: ".*[Rr][Uu][Tt].*|.*[Nn]ombre.*|.*[Rr]az[oó]n.*"
    timeout: 30000

# Verificar campos obligatorios del formulario
- assertVisible:
    text: ".*[Ee]mail.*|.*[Cc]orreo.*"
- assertVisible:
    text: ".*[Rr]egi[oó]n.*|.*[Cc]omuna.*"

# BUG CONOCIDO: selector Región no carga opciones — verificar sin bloquear sesión
- tapOn:
    text: ".*[Rr]egi[oó]n.*"
    optional: true
- assertVisible:
    text: ".*[Aa]ntofagasta.*|.*[Mm]etropolitana.*|.*[Vv]alparaíso.*|.*[Tt]arapac[aá].*|.*[Rr]egi[oó]n.*"
    optional: true

# Descartar cualquier popup de permisos (mic, etc.)
- runFlow:
    when:
      visible:
        text: ".*[Dd]eny.*|.*[Aa]llow.*|.*[Pp]ermission.*"
    commands:
      - tapOn:
          text: "Deny"
          optional: true
      - waitForAnimationToEnd

# Cerrar picker Región
- pressKey: Back
- waitForAnimationToEnd
# Cerrar teclado si reaparece tras cerrar picker (Samsung refoca campos de texto)
- pressKey: Back
- waitForAnimationToEnd

# X del form — dispositivos físicos Samsung tienen status bar más alta (~9%)
# Cascade: 9% → 7% → 4% cubre Samsung One UI, Pixel y emulador
- tapOn:
    point: "93%,9%"
    optional: true
- waitForAnimationToEnd
- runFlow:
    when:
      visible:
        text: "Crear nuevo comercio"
    commands:
      - tapOn:
          point: "93%,7%"
          optional: true
      - waitForAnimationToEnd
- runFlow:
    when:
      visible:
        text: "Crear nuevo comercio"
    commands:
      - tapOn:
          point: "93%,4%"
          optional: true
      - waitForAnimationToEnd

# Esperar título de lista
- extendedWaitUntil:
    visible:
      text: "Listado de comercios"
    timeout: 20000
