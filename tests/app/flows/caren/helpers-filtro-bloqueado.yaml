appId: ${APP_PACKAGE}
# Helper: verifica que la lista muestre comercios bloqueados — NO aplica filtro
# El badge "Bloqueado" es visible directamente en las tarjetas
---
- runFlow: helpers-startup.yaml

- extendedWaitUntil:
    visible:
      text: ".*[Bb]loqueado.*"
    timeout: 15000

- waitForAnimationToEnd
