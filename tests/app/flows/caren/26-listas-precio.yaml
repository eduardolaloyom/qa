appId: ${APP_PACKAGE}
name: "CAREN: 26 — Listas de precio por segmento"
# OBJETIVO: Verificar que el precio mostrado corresponde al segmento del comercio
# Alcance 3.3: "Precios diferenciados por segmento de cliente"
# NOTA: Requiere dos comercios de distinto segmento para comparar precios del mismo SKU
---
- runFlow: helpers-startup.yaml
- runFlow: helpers-filtro-disponible.yaml

- tapOn:
    text: ".*\\d{7,}.*"
    index: 0
    optional: true
- extendedWaitUntil:
    visible:
      text: "Continuar|.*[Hh]acer [Pp]edido.*|.*[Cc]at[aá]logo.*"
    timeout: 15000
- tapOn:
    text: "Continuar"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: ".*[Hh]acer [Pp]edido.*|.*[Cc]at[aá]logo.*|.*[Pp]roductos.*"
    optional: true
- extendedWaitUntil:
    visible:
      text: ".*[Aa]gregar.*|.*[Pp]roducto.*"
    timeout: 20000

# HARD ASSERT: precio visible en catálogo (indica que price list está aplicada)
- assertVisible:
    text: ".*\\$[0-9].*|.*[0-9]+\\.[0-9]{3}.*|.*[Pp]recio.*"

- runFlow: helpers-volver-lista.yaml
