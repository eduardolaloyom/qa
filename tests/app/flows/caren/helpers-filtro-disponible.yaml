appId: ${APP_PACKAGE}
# Helper: verifica que la lista muestre comercios — NO aplica filtro
# Los badges "Disponible"/"Bloqueado" son visibles directamente en las tarjetas
---
- runFlow: helpers-startup.yaml

- extendedWaitUntil:
    visible:
      text: ".*[Dd]isponible.*|.*[Bb]loqueado.*"
    timeout: 15000

- waitForAnimationToEnd
