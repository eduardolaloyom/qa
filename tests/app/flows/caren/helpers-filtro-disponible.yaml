appId: ${APP_PACKAGE}
# Helper: aplica filtro "Disponible" desde la lista de comercios
# Precondición: estar en pantalla "Listado de comercios" con datos
---
# Abrir panel de filtros via "Seleccionar filtros" (texto link en pantalla)
- tapOn:
    text: "Seleccionar filtros"
    optional: true
- waitForAnimationToEnd

# Fallback: hamburger ≡ top-right si el link no apareció
- runFlow:
    when:
      notVisible:
        text: ".*[Dd]isponible.*|.*[Bb]loqueado.*|.*[Aa]dvertencia.*"
    commands:
      - tapOn:
          point: "93%,4%"
      - waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      text: ".*[Dd]isponible.*|.*[Bb]loqueado.*"
    timeout: 15000

- tapOn:
    text: "Disponible"

- swipe:
    direction: UP
    duration: 300

- tapOn:
    point: "50%,93%"

- extendedWaitUntil:
    notVisible:
      text: ".*[Aa]plicar [Ff]iltros.*|.*[Aa]plicar filtros.*"
    timeout: 15000

- waitForAnimationToEnd
