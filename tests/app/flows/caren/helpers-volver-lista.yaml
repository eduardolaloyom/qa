appId: ${APP_PACKAGE}
# Helper: vuelve al listado de comercios desde cualquier pantalla dentro de un comercio
# Caren usa "Listado de comercios (D)" como header, no "Seleccionar filtros"
---
- tapOn:
    text: "COMERCIOS"
    optional: true
- waitForAnimationToEnd

- runFlow:
    when:
      notVisible:
        text: ".*Listado de comercios.*|Crear comercio"
    commands:
      - pressKey: Back
      - waitForAnimationToEnd

- runFlow:
    when:
      notVisible:
        text: ".*Listado de comercios.*|Crear comercio"
    commands:
      - pressKey: Back
      - waitForAnimationToEnd

- runFlow:
    when:
      notVisible:
        text: ".*Listado de comercios.*|Crear comercio"
    commands:
      - pressKey: Back
      - waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      text: ".*Listado de comercios.*|Crear comercio"
    timeout: 20000
