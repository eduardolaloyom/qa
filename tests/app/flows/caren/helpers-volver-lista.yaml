appId: ${APP_PACKAGE}
# Helper: vuelve al listado de comercios desde cualquier pantalla dentro de un comercio
---
- tapOn:
    text: "COMERCIOS"
    optional: true
- waitForAnimationToEnd

- runFlow:
    when:
      notVisible:
        text: "Seleccionar filtros|.*[Ss]eleccionar filtros.*"
    commands:
      - pressKey: Back
      - waitForAnimationToEnd

- runFlow:
    when:
      notVisible:
        text: "Seleccionar filtros|.*[Ss]eleccionar filtros.*"
    commands:
      - pressKey: Back
      - waitForAnimationToEnd

- runFlow:
    when:
      notVisible:
        text: "Seleccionar filtros|.*[Ss]eleccionar filtros.*"
    commands:
      - pressKey: Back
      - waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      text: "Seleccionar filtros|.*[Ss]eleccionar filtros.*"
    timeout: 20000
