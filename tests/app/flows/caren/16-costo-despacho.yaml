appId: ${APP_PACKAGE}
name: "CAREN: 16 — Costo de despacho en carrito"
# OBJETIVO: Verificar que el costo de despacho se muestra en el resumen del carrito
# Alcance 3.4: "Aplicación de costos de despacho variables"
---
- runFlow: helpers-startup.yaml
- runFlow: helpers-filtro-disponible.yaml

- tapOn:
    text: ".*\\d{7,}.*"
    index: 0
    optional: true
- extendedWaitUntil:
    visible:
      text: "Continuar|.*[Hh]acer [Pp]edido.*|.*[Cc]at[aá]logo.*"
    timeout: 15000
- tapOn:
    text: "Continuar"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: ".*[Hh]acer [Pp]edido.*|.*[Cc]at[aá]logo.*|.*[Pp]roductos.*"
    optional: true
- extendedWaitUntil:
    visible:
      text: ".*[Aa]gregar.*|.*[Pp]roducto.*"
    timeout: 20000

- tapOn:
    text: ".*[Aa]gregar.*"
    index: 0
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: ".*[Mm]i [Pp]edido.*|.*[Vv]er [Cc]arrito.*|.*[Cc]arrito.*"
    optional: true
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      text: ".*[Tt]otal.*|.*[Rr]esumen.*|.*[Cc]onfirmar.*"
    timeout: 15000

# HARD ASSERT: costo de despacho visible en carrito
- assertVisible:
    text: ".*[Cc]osto.*[Dd]espacho.*|.*[Cc]osto.*[Ee]nv[íi]o.*|.*[Ff]lete.*|.*[Ss]hipping.*"

- runFlow: helpers-volver-lista.yaml
