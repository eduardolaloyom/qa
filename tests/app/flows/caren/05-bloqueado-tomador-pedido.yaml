appId: ${APP_PACKAGE}
name: "CAREN: 05 — Bug catálogo bloqueado (acceso a Tomador de Pedido)"
# OBJETIVO: Confirmar si comercio bloqueado permite entrar al Tomador de Pedido
# y si se puede armar carrito + enviar pedido desde un bloqueado
# BUG CONOCIDO: assignedSellers falla → no hay badges Bloqueado → flow se saltea
---

- runFlow: helpers-filtro-bloqueado.yaml

- runFlow:
    when:
      visible:
        text: ".*[Bb]loqueado.*"
    commands:
      - tapOn:
          text: ".*[Bb]loqueado.*"
          index: 0
          optional: true
      - extendedWaitUntil:
          visible:
            text: "Continuar|Hacer pedido|.*[Tt]areas.*"
          timeout: 15000
      - tapOn:
          text: "Continuar"
          optional: true
      - waitForAnimationToEnd
      - tapOn:
          text: "Hacer pedido"
          optional: true
      - waitForAnimationToEnd
      - runFlow:
          when:
            visible:
              text: "Continuar"
          commands:
            - tapOn:
                text: "Continuar"
            - waitForAnimationToEnd
      - extendedWaitUntil:
          visible:
            text: ".*[Aa]gregar.*|.*[Cc]at[aá]logo.*|.*[Pp]roducto.*|.*[Ss]in.*productos.*|Filtrar|Sugerencias|Tomador de Pedido|.*Sin stock.*"
          timeout: 20000
      - tapOn:
          text: "Sugerencias"
          optional: true
      - waitForAnimationToEnd
      - swipe:
          direction: DOWN
          duration: 1500
      - swipe:
          direction: DOWN
          duration: 1500
      - swipe:
          direction: DOWN
          duration: 1500
      - tapOn:
          text: ".*[Aa]gregar.*"
          index: 0
          optional: true
      - waitForAnimationToEnd
      - tapOn:
          text: "Mi pedido"
          optional: true
      - waitForAnimationToEnd
      - swipe:
          direction: UP
          duration: 1200
      - swipe:
          direction: UP
          duration: 1200
      # HARD: el mensaje/popup de comercio bloqueado debe aparecer
      - assertVisible:
          text: ".*[Cc]omercio [Bb]loqueado.*|Este comercio se encuentra bloqueado"
      # NOTA: el botón "Finalizar Pedido" puede aparecer visualmente pero deshabilitado — comportamiento correcto
      - tapOn:
          text: ".*[Xx].*|.*[Cc]errar.*"
          optional: true
      - waitForAnimationToEnd
      - runFlow: helpers-volver-lista.yaml
