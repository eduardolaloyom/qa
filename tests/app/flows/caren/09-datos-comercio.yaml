appId: ${APP_PACKAGE}
name: "CAREN: 09 — Datos del comercio (dirección, info, crédito)"
# OBJETIVO: Verificar la ficha de datos del comercio
# Chequea: nombre, RUT, dirección, teléfono, email, estado crediticio, límite de crédito
# Para disponible (MARIA TERESA) y bloqueado (0000000000)
---

- runFlow: helpers-startup.yaml
- runFlow: helpers-volver-lista.yaml

# ── COMERCIO DISPONIBLE: MARIA TERESA ────────────────────────────────────────
- runFlow: helpers-filtro-disponible.yaml

- tapOn:
    text: ".*[Dd]isponible.*"
    index: 0
- waitForAnimationToEnd

# En la ficha del comercio — explorar toda la info antes de "Hacer pedido"
# Scroll DOWN para ver todos los campos de la ficha
- swipe:
    direction: DOWN
    duration: 1500
- swipe:
    direction: DOWN
    duration: 1500

# Buscar tab o sección de "Información" / "Datos"
- tapOn:
    text: ".*[Ii]nformaci[oó]n.*|.*[Dd]atos.*|.*[Pp]erfil.*|.*[Dd]etalle.*"
    optional: true
- waitForAnimationToEnd

- swipe:
    direction: DOWN
    duration: 1500
- swipe:
    direction: DOWN
    duration: 1500

- runFlow: helpers-volver-lista.yaml

# ── COMERCIO BLOQUEADO: datos de crédito ─────────────────────────────────────
- runFlow: helpers-filtro-bloqueado.yaml

- tapOn:
    text: ".*[Bb]loqueado.*"
    index: 0
- waitForAnimationToEnd

# Cerrar popup si aparece
- tapOn:
    text: "Continuar"
    optional: true
- waitForAnimationToEnd

# Explorar ficha del bloqueado
- swipe:
    direction: DOWN
    duration: 1500
- swipe:
    direction: DOWN
    duration: 1500

# Buscar info de crédito: límite, deuda, vencimiento
- tapOn:
    text: ".*[Ii]nformaci[oó]n.*|.*[Dd]atos.*|.*[Cc]r[eé]dito.*|.*[Dd]euda.*"
    optional: true
- waitForAnimationToEnd

- swipe:
    direction: DOWN
    duration: 1500
- swipe:
    direction: DOWN
    duration: 1500

- runFlow: helpers-volver-lista.yaml
