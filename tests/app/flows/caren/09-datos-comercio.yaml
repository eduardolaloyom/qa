appId: ${APP_PACKAGE}
name: "CAREN: 09 — Datos de TODOS los comercios (ficha, dirección, crédito)"
# OBJETIVO: Visitar los 5 comercios uno a uno y documentar su ficha completa
# Comercios: MARIA TERESA (disponible) + 4 bloqueados
# Chequea: nombre, RUT, dirección, estado, info de crédito en bloqueados
---

- runFlow: helpers-startup.yaml
- runFlow: helpers-volver-lista.yaml

# ── 1. MARIA TERESA (disponible) ─────────────────────────────────────────────
- runFlow: helpers-filtro-disponible.yaml

- tapOn:
    text: ".*[Dd]isponible.*"
    index: 0
- waitForAnimationToEnd

- swipe:
    direction: DOWN
    duration: 1500
- swipe:
    direction: DOWN
    duration: 1500

- tapOn:
    text: ".*[Ii]nformaci[oó]n.*|.*[Dd]atos.*|.*[Pp]erfil.*|.*[Dd]etalle.*"
    optional: true
- waitForAnimationToEnd

- swipe:
    direction: DOWN
    duration: 1500
- swipe:
    direction: DOWN
    duration: 1500

- runFlow: helpers-volver-lista.yaml

# ── 2. BLOQUEADO 1: 0000000000 ────────────────────────────────────────────────
- runFlow: helpers-filtro-bloqueado.yaml

- tapOn:
    text: ".*[Bb]loqueado.*"
    index: 0
- waitForAnimationToEnd

- tapOn:
    text: "Continuar"
    optional: true
- waitForAnimationToEnd

- swipe:
    direction: DOWN
    duration: 1500
- swipe:
    direction: DOWN
    duration: 1500

- tapOn:
