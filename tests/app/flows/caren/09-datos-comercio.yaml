appId: ${APP_PACKAGE}
name: "CAREN: 09 — Datos de comercios (ficha, dirección, crédito)"
# OBJETIVO: Visitar comercios uno a uno y documentar su ficha completa
# Usa IDs numéricos para disponibles; bloqueados condicionales (assignedSellers bug)
---

- runFlow: helpers-startup.yaml
- runFlow: helpers-volver-lista.yaml

# ── 1. Comercio disponible (por ID numérico) ──────────────────────────────────
- runFlow: helpers-filtro-disponible.yaml

- tapOn:
    text: ".*\\d{7,}.*"
    index: 0
    optional: true
- waitForAnimationToEnd

- runFlow:
    when:
      notVisible:
        text: ".*Listado de comercios.*|Crear comercio"
    commands:
      - swipe:
          direction: DOWN
          duration: 1500
      - swipe:
          direction: DOWN
          duration: 1500
      - tapOn:
          text: ".*[Ii]nformaci[oó]n.*|.*[Dd]atos.*|.*[Pp]erfil.*|.*[Dd]etalle.*"
          optional: true
      - waitForAnimationToEnd
      - swipe:
          direction: DOWN
          duration: 1500
      - swipe:
          direction: DOWN
          duration: 1500
      - runFlow: helpers-volver-lista.yaml

# ── 2–5. Comercios bloqueados (condicional — badge puede no estar visible) ────
- runFlow: helpers-filtro-bloqueado.yaml

- runFlow:
    when:
      visible:
        text: ".*[Bb]loqueado.*"
    commands:
      - tapOn:
          text: ".*[Bb]loqueado.*"
          index: 0
          optional: true
      - waitForAnimationToEnd
      - tapOn:
          text: "Continuar"
          optional: true
      - waitForAnimationToEnd
      - swipe:
          direction: DOWN
          duration: 1500
      - swipe:
          direction: DOWN
          duration: 1500
      - tapOn:
          text: ".*[Ii]nformaci[oó]n.*|.*[Dd]atos.*|.*[Cc]r[eé]dito.*|.*[Dd]euda.*"
          optional: true
      - waitForAnimationToEnd
      - swipe:
          direction: DOWN
          duration: 1500
      - swipe:
          direction: DOWN
          duration: 1500
      - runFlow: helpers-volver-lista.yaml

- runFlow:
    when:
      visible:
        text: ".*[Bb]loqueado.*"
    commands:
      - tapOn:
          text: ".*[Bb]loqueado.*"
          index: 1
          optional: true
      - waitForAnimationToEnd
      - tapOn:
          text: "Continuar"
          optional: true
      - waitForAnimationToEnd
      - swipe:
          direction: DOWN
          duration: 1500
      - swipe:
          direction: DOWN
          duration: 1500
      - tapOn:
          text: ".*[Ii]nformaci[oó]n.*|.*[Dd]atos.*|.*[Cc]r[eé]dito.*|.*[Dd]euda.*"
          optional: true
      - waitForAnimationToEnd
      - swipe:
          direction: DOWN
          duration: 1500
      - swipe:
          direction: DOWN
          duration: 1500
      - runFlow: helpers-volver-lista.yaml

- runFlow:
    when:
      visible:
        text: ".*[Bb]loqueado.*"
    commands:
      - tapOn:
          text: ".*[Bb]loqueado.*"
          index: 2
          optional: true
      - waitForAnimationToEnd
      - tapOn:
          text: "Continuar"
          optional: true
      - waitForAnimationToEnd
      - swipe:
          direction: DOWN
          duration: 1500
      - swipe:
          direction: DOWN
          duration: 1500
      - tapOn:
          text: ".*[Ii]nformaci[oó]n.*|.*[Dd]atos.*|.*[Cc]r[eé]dito.*|.*[Dd]euda.*"
          optional: true
      - waitForAnimationToEnd
      - swipe:
          direction: DOWN
          duration: 1500
      - swipe:
          direction: DOWN
          duration: 1500
      - runFlow: helpers-volver-lista.yaml

- runFlow:
