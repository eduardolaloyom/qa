appId: ${APP_PACKAGE}
# Helper: lanza la app y deja al usuario en la lista de comercios
# NO-OP si ya estamos en la lista (detecta por badges Disponible/Bloqueado o header)
---

# Cerrar menú lateral si está abierto (evita falso positivo en "Listado de comercios")
- runFlow:
    when:
      visible:
        text: "Cerrar sesión"
    commands:
      - pressKey: BACK
      - waitForAnimationToEnd

# Si ya hay comercios visibles en pantalla, no hacer nada
- runFlow:
    when:
      notVisible:
        text: "Seleccionar filtros|Listado de comercios|.*[Dd]isponible.*|.*[Bb]loqueado.*|MARIA TERESA"
    commands:
      - launchApp:
          clearState: false

      - waitForAnimationToEnd

      # Manejar login si es necesario
      - runFlow:
          when:
            visible:
              text: ".*[Cc]orreo.*|.*[Ee]-mail.*|.*[Ee]mail.*|.*[Uu]suario.*"
          commands:
            - tapOn:
                text: ".*[Cc]orreo.*|.*[Ee]-mail.*|.*[Ee]mail.*|.*[Uu]suario.*"
                optional: true
            - inputText: ${TEST_SELLER_EMAIL}
            - tapOn:
                text: ".*[Cc]ontraseña.*|.*[Pp]assword.*|.*[Cc]lave.*"
                optional: true
            - inputText: ${TEST_SELLER_PASSWORD}
            - hideKeyboard
            - tapOn:
                text: ".*[Ii]niciar [Ss]esi[oó]n.*|.*[Ll]ogin.*|.*[Ee]ntrar.*|.*INGRESAR.*|.*[Aa]cceder.*"
                optional: true
            - waitForAnimationToEnd

      # Esperar pantalla post-login (sync puede tardar hasta 90s)
      - extendedWaitUntil:
          visible:
            text: "Seleccionar filtros|Listado de comercios|.*[Ss]incronizando.*|.*[Cc]omercio.*|.*[Dd]isponible.*|.*[Bb]loqueado.*"
          timeout: 45000

      # Si hay sync automático, esperar que termine
      - runFlow:
          when:
            visible:
              text: ".*[Ss]incronizando.*"
          commands:
            - extendedWaitUntil:
                notVisible:
                  text: ".*[Ss]incronizando.*"
                timeout: 90000

      # Descartar popups post-sync
      - tapOn:
          text: "CANCELAR"
          optional: true
      - tapOn:
          text: "Seguir sin sincronizar"
          optional: true
      - waitForAnimationToEnd

      # Si no hay comercios, triggear sync manual
      - runFlow:
          when:
            visible:
              text: "No se encontraron comercios|SINCRONIZAR"
          commands:
            - tapOn:
                text: "SINCRONIZAR"
                optional: true
            - extendedWaitUntil:
                notVisible:
                  text: ".*[Ss]incronizando.*|SINCRONIZAR"
                timeout: 300000
            - waitForAnimationToEnd

      # Confirmar lista lista
      - extendedWaitUntil:
          visible:
            text: "Seleccionar filtros|.*Listado de comercios.*|.*[Dd]isponible.*|.*[Bb]loqueado.*|Crear comercio"
          timeout: 60000

      - waitForAnimationToEnd
