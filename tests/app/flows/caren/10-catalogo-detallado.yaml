appId: ${APP_PACKAGE}
name: "CAREN: 10 — Catálogo de comercios (fotos, SKUs, tabs, precios)"
# OBJETIVO: Auditar catálogo de cada comercio — tabs, scroll, SKUs, precios
# Disponibles: por ID numérico. Bloqueados: condicional (assignedSellers bug)
---

- runFlow: helpers-startup.yaml
- runFlow: helpers-volver-lista.yaml

# ── 1. Comercio disponible (por ID numérico) ──────────────────────────────────
- runFlow: helpers-filtro-disponible.yaml

- tapOn:
    text: ".*\\d{7,}.*"
    index: 0
    optional: true
- waitForAnimationToEnd

- runFlow:
    when:
      notVisible:
        text: ".*Listado de comercios.*|Crear comercio"
    commands:
      - tapOn:
          text: ".*[Hh]acer [Pp]edido.*|.*[Cc]at[aá]logo.*"
          optional: true
      - waitForAnimationToEnd
      - tapOn:
          text: "Sugerencias"
          optional: true
      - waitForAnimationToEnd
      - swipe:
          direction: DOWN
          duration: 1500
      - swipe:
          direction: DOWN
          duration: 1500
      - swipe:
          direction: DOWN
          duration: 1500
      - tapOn:
          text: ".*[Tt]odos.*|.*[Tt]odo.*|.*[Pp]roductos.*"
          optional: true
      - waitForAnimationToEnd
      - swipe:
          direction: DOWN
          duration: 1500
      - swipe:
          direction: DOWN
          duration: 1500
      - swipe:
          direction: DOWN
          duration: 1500
      - tapOn:
          text: ".*[Cc]ategor[ií]a.*"
          optional: true
      - waitForAnimationToEnd
      - swipe:
          direction: DOWN
          duration: 1500
      - runFlow: helpers-volver-lista.yaml

# ── 2–5. Bloqueados (condicional) ─────────────────────────────────────────────
