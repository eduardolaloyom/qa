appId: ${APP_PACKAGE}
name: "CAREN: 10 — Catálogo de comercios (fotos, SKUs, tabs, precios, stock)"
# OBJETIVO: Auditar catálogo — tabs, scroll, SKUs, precios, stock e imágenes de productos
# Disponibles: por ID numérico. Bloqueados: condicional (assignedSellers bug)
---

- runFlow: helpers-startup.yaml
- runFlow: helpers-volver-lista.yaml

# ── 1. Comercio disponible (por ID numérico) ──────────────────────────────────
- runFlow: helpers-filtro-disponible.yaml

- tapOn:
    text: ".*\\d{7,}.*"
    index: 0
    optional: true
- extendedWaitUntil:
    visible:
      text: "Continuar|.*[Hh]acer [Pp]edido.*|.*[Cc]at[aá]logo.*|.*[Tt]areas.*|.*Listado de comercios.*"
    timeout: 15000
- tapOn:
    text: "Continuar"
    optional: true
- waitForAnimationToEnd

- runFlow:
    when:
      notVisible:
        text: ".*Listado de comercios.*|Crear comercio"
    commands:
      - tapOn:
          text: ".*[Hh]acer [Pp]edido.*|.*[Cc]at[aá]logo.*"
          optional: true
      - waitForAnimationToEnd
      - runFlow:
          when:
            visible:
              text: "Continuar"
          commands:
            - tapOn:
                text: "Continuar"
            - waitForAnimationToEnd

      # ── Tab Sugerencias ──────────────────────────────────────────────────────
      - tapOn:
          text: "Sugerencias"
          optional: true
      - waitForAnimationToEnd

      # Verificar imágenes y stock en los primeros productos visibles
      - assertVisible:
          text: ".*[Aa]gregar.*|.*[Pp]roducto.*|.*[Ss]in.*[Pp]roductos.*"
          optional: true
      - assertNotVisible:
          text: ".*[Ii]magen.*[Rr]ota.*|.*image.*broken.*|.*error.*foto.*"
          optional: true
      - assertVisible:
          text: ".*\\$[\\d\\.]+.*|.*[Pp]recio.*|.*[Uu]nid.*|.*[Ss]tock.*|.*[Ss]in [Ss]tock.*|.*[Aa]gotar.*"
          optional: true

      - swipe:
          direction: DOWN
          duration: 1500
      - swipe:
          direction: DOWN
          duration: 1500

      # Verificar indicadores de stock en productos scrolleados
      - assertVisible:
          text: ".*[Ss]tock.*|.*[Uu]nidades.*|.*[Ss]in [Ss]tock.*|.*[Aa]gotado.*|.*[Aa]gregar.*"
          optional: true

      - swipe:
          direction: DOWN
          duration: 1500

      # ── Tab Todos / Productos ────────────────────────────────────────────────
      - tapOn:
          text: ".*[Tt]odos.*|.*[Tt]odo.*|.*[Pp]roductos.*"
          optional: true
      - waitForAnimationToEnd

      - assertVisible:
          text: ".*[Aa]gregar.*|.*[Pp]roducto.*|.*[Ss]in.*[Pp]roductos.*"
          optional: true

      # Verificar precios visibles
      - assertVisible:
          text: ".*\\$[\\d\\.]+.*|.*[Pp]recio.*"
          optional: true

      - swipe:
          direction: DOWN
          duration: 1500
      - swipe:
          direction: DOWN
          duration: 1500
      - swipe:
          direction: DOWN
          duration: 1500

      # ── Tab Categoría ────────────────────────────────────────────────────────
      - tapOn:
          text: ".*[Cc]ategor[ií]a.*"
          optional: true
      - waitForAnimationToEnd
      - swipe:
          direction: DOWN
          duration: 1500

      - runFlow: helpers-volver-lista.yaml

# ── 2–5. Bloqueados (condicional) ─────────────────────────────────────────────
- runFlow: helpers-filtro-bloqueado.yaml

- runFlow:
