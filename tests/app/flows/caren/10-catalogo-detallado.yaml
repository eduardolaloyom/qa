          optional: true
      - assertVisible:
          text: ".*\\$[\\d\\.]+.*|.*[Pp]recio.*"
          optional: true
      - swipe:
          direction: DOWN
          duration: 1500
      - swipe:
          direction: DOWN
          duration: 1500
      - swipe:
          direction: DOWN
          duration: 1500
      - tapOn:
          text: ".*[Tt]odos.*|.*[Tt]odo.*|.*[Pp]roductos.*"
          optional: true
      - waitForAnimationToEnd
      - swipe:
          direction: DOWN
