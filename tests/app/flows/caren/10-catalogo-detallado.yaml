appId: ${APP_PACKAGE}
name: "CAREN: 10 — Catálogo de TODOS los comercios (fotos, SKUs, tabs, precios)"
# OBJETIVO: Auditar catálogo de cada uno de los 5 comercios
# Chequea por comercio: fotos presentes, tabs disponibles, SKUs visibles, precios
# MARIA TERESA (disponible) + 4 bloqueados (que según flow 05 muestran catálogo completo)
---

- runFlow: helpers-startup.yaml
- runFlow: helpers-volver-lista.yaml

# ── HELPER interno: explorar tabs y scroll del catálogo ───────────────────────
# Se repite para cada comercio — tab Sugerencias, tab Todos, scroll profundo

# ── 1. MARIA TERESA (disponible) ─────────────────────────────────────────────
- runFlow: helpers-filtro-disponible.yaml

- tapOn:
    text: ".*[Dd]isponible.*"
    index: 0
- waitForAnimationToEnd

- tapOn:
    text: ".*[Hh]acer [Pp]edido.*|.*[Cc]at[aá]logo.*"
    optional: true
- waitForAnimationToEnd

- tapOn:
    text: "Sugerencias"
    optional: true
- waitForAnimationToEnd

- swipe:
    direction: DOWN
    duration: 1500
- swipe:
    direction: DOWN
    duration: 1500
- swipe:
    direction: DOWN
    duration: 1500

- tapOn:
    text: ".*[Tt]odos.*|.*[Tt]odo.*|.*[Pp]roductos.*"
    optional: true
- waitForAnimationToEnd

- swipe:
    direction: DOWN
    duration: 1500
- swipe:
    direction: DOWN
    duration: 1500
- swipe:
    direction: DOWN
    duration: 1500

- tapOn:
    text: ".*[Cc]ategor[ií]a.*"
    optional: true
- waitForAnimationToEnd

- swipe:
    direction: DOWN
    duration: 1500

- runFlow: helpers-volver-lista.yaml

