appId: ${APP_PACKAGE}
name: "CAREN: 11 — Selector de Centro de Distribución pre-catálogo"
# OBJETIVO: Verificar que el selector de CD aparece antes de mostrar el catálogo
# Config: enableDistributionCentersSelector=true, hasSingleDistributionCenter=false
# Alcance sec 4 (bloqueante): "Selección de CD antes de entrar al catálogo para reflejar stock"
# PASOS: 1. Login como vendedor | 2. Ir a lista de comercios | 3. Tap en un comercio disponible | 4. Tap "Hacer Pedido" | 5. Esperado: aparece pantalla de selección de Centro de Distribución antes del catálogo | 6. Actual: el catálogo carga directamente sin selector de CD
---

- runFlow: helpers-startup.yaml
- runFlow: helpers-filtro-disponible.yaml

- tapOn:
    text: ".*\\d{7,}.*"
    index: 0
    optional: true
- waitForAnimationToEnd

- tapOn:
    text: "Continuar"
    optional: true
- waitForAnimationToEnd

- tapOn:
    text: ".*[Hh]acer [Pp]edido.*|.*[Cc]at[aá]logo.*|.*[Pp]roductos.*|Tomador de Pedido"
    optional: true
- waitForAnimationToEnd

- tapOn:
    text: "Continuar"
    optional: true
- waitForAnimationToEnd

# Esperar: debería aparecer selector CD o catálogo directamente
- extendedWaitUntil:
    visible:
      text: ".*[Cc]entro.*[Dd]istribuci[oó]n.*|.*[Ss]eleccionar.*[Cc][Dd].*|.*[Bb]odega.*|.*[Aa]gregar.*|.*[Ss]ugerencias.*|.*[Pp]roductos.*"
    timeout: 20000

# HARD: selector de CD debe aparecer antes del catálogo — bloqueante alcance sec. 4
- assertVisible:
    text: ".*[Cc]entro.*[Dd]istribuci[oó]n.*|.*[Ss]eleccionar.*[Cc][Dd].*|.*[Dd]istribuci[oó]n.*|.*[Bb]odega.*"

# Seleccionar primer CD disponible
- runFlow: helpers-selector-cd.yaml

# Verificar que el catálogo carga después de seleccionar CD
- extendedWaitUntil:
    visible:
      text: ".*[Aa]gregar.*|.*[Ss]ugerencias.*|.*[Ff]iltrar.*|.*[Pp]roducto.*|.*[Cc]at[aá]logo.*"
    timeout: 20000

# Scroll para verificar que los productos tienen stock del CD seleccionado
- swipe:
    direction: DOWN
    duration: 1200
- swipe:
    direction: DOWN
    duration: 1200

- runFlow: helpers-volver-lista.yaml
