appId: ${APP_PACKAGE}
name: "CAREN: 05b — Verificación P1 carrito limpio (CAREN-QA-002)"
# OBJETIVO: Confirmar o descartar P1 con clearState=true
# Lanza la app desde cero (sin carrito previo) y va directo a un comercio bloqueado
# Si "Finalizar pedido" aparece con carrito vacío → P1 REAL
# BUG CONOCIDO: assignedSellers falla → no hay badges Bloqueado → flow se saltea
---

- launchApp:
    clearState: true
- waitForAnimationToEnd

- runFlow:
    when:
      visible:
        text: ".*[Cc]orreo.*|.*[Ee]-mail.*|.*[Ee]mail.*|.*[Uu]suario.*"
    commands:
      - tapOn:
          text: ".*[Cc]orreo.*|.*[Ee]-mail.*|.*[Ee]mail.*|.*[Uu]suario.*"
          optional: true
      - inputText: ${TEST_SELLER_EMAIL}
      - tapOn:
          text: ".*[Cc]ontraseña.*|.*[Pp]assword.*|.*[Cc]lave.*"
          optional: true
      - inputText: ${TEST_SELLER_PASSWORD}
      - hideKeyboard
      - tapOn:
          text: ".*[Ii]niciar [Ss]esi[oó]n.*|.*[Ll]ogin.*|.*[Ee]ntrar.*|.*INGRESAR.*|.*[Aa]cceder.*"
          optional: true
      - waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      text: "Seleccionar filtros|Listado de comercios|.*[Ss]incronizando.*|.*[Cc]omercio.*"
    timeout: 90000

- runFlow:
    when:
      visible:
        text: ".*[Ss]incronizando.*"
    commands:
      - extendedWaitUntil:
          notVisible:
            text: ".*[Ss]incronizando.*"
          timeout: 300000

- tapOn:
    text: "CANCELAR"
    optional: true
- tapOn:
    text: "Seguir sin sincronizar"
    optional: true
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      text: ".*Listado de comercios.*|Crear comercio"
    timeout: 60000

- runFlow: helpers-filtro-bloqueado.yaml

- runFlow:
    when:
      visible:
        text: ".*[Bb]loqueado.*"
    commands:
      - tapOn:
          text: ".*[Bb]loqueado.*"
          index: 0
          optional: true
      - extendedWaitUntil:
          visible:
            text: "Continuar|Hacer pedido|.*[Tt]areas.*"
          timeout: 15000
      - tapOn:
          text: "Continuar"
          optional: true
      - waitForAnimationToEnd
      - tapOn:
          text: "Hacer pedido"
          optional: true
      - waitForAnimationToEnd
      - swipe:
          direction: DOWN
          duration: 1000
      - swipe:
          direction: DOWN
          duration: 1000
      - tapOn:
          text: ".*[Aa]gregar.*|.*[Aa]ñadir.*|[+]"
          optional: true
      - waitForAnimationToEnd
      - tapOn:
          text: ".*[Cc]arrito.*|.*[Pp]edido.*|.*[Vv]er [Pp]edido.*"
          optional: true
      - waitForAnimationToEnd
      # HARD: el mensaje de comercio bloqueado debe aparecer
      - assertVisible:
          text: ".*[Cc]omercio [Bb]loqueado.*|Este comercio se encuentra bloqueado"
      # HARD: no debe ser posible finalizar pedido en comercio bloqueado
      - assertNotVisible:
          text: ".*[Ff]inalizar [Pp]edido.*|.*[Cc]onfirmar [Pp]edido.*|.*[Ee]nviar [Pp]edido.*"
      - tapOn:
          text: ".*[Xx].*|.*[Cc]errar.*"
          optional: true
      - waitForAnimationToEnd
      - runFlow: helpers-volver-lista.yaml
