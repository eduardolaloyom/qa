      visible:
        text: ".*[Bb]loqueado.*"
    commands:
      - tapOn:
          text: ".*[Bb]loqueado.*"
          index: 1
          optional: true
      - waitForAnimationToEnd
      - runFlow:
          when:
            notVisible:
              text: ".*Listado de comercios.*|Crear comercio"
          commands:
            - tapOn:
                text: ".*[Hh]acer [Pp]edido.*|.*[Cc]at[aá]logo.*|.*[Pp]roductos.*"
                optional: true
            - extendedWaitUntil:
                visible:
                  text: ".*[Aa]gregar.*|.*[Cc]at[aá]logo.*|.*[Pp]roducto.*|.*[Ss]in.*productos.*|.*[Bb]loqueado.*|.*[Cc]ategor.*"
