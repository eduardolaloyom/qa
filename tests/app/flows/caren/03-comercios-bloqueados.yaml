appId: ${APP_PACKAGE}
name: "CAREN: 03 — Catálogo comercios BLOQUEADOS"
# OBJETIVO: documentar cuántos productos muestra cada comercio bloqueado
# BUG CONOCIDO: assignedSellers falla con 0 requests → no aparecen badges Bloqueado/Disponible
# Si no hay badges visibles, el flow pasa de largo (hallazgo documentado aparte)
# Verifica además que no se puede hacer pedido en ningún bloqueado
---

# ─── COMERCIO BLOQUEADO 1 (condicional) ───────────────────────────────────────
- runFlow: helpers-filtro-bloqueado.yaml

- runFlow:
    when:
      visible:
        text: ".*[Bb]loqueado.*"
    commands:
      - tapOn:
          text: ".*[Bb]loqueado.*"
          index: 0
          optional: true
      - waitForAnimationToEnd
      - tapOn:
          text: ".*[Hh]acer [Pp]edido.*|.*[Cc]at[aá]logo.*|.*[Pp]roductos.*"
          optional: true
      - extendedWaitUntil:
          visible:
            text: ".*[Aa]gregar.*|.*[Cc]at[aá]logo.*|.*[Pp]roducto.*|.*[Ss]in.*productos.*|.*[Bb]loqueado.*|.*[Cc]ategor.*"
          timeout: 20000
      - swipe:
          direction: DOWN
          duration: 1500
      - swipe:
          direction: DOWN
          duration: 1500
      - assertNotVisible:
          text: ".*[Cc]onfirmar [Pp]edido.*|.*[Ee]nviar [Pp]edido.*"
          optional: true
      - runFlow: helpers-volver-lista.yaml

