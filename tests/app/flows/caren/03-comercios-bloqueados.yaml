appId: ${APP_PACKAGE}
name: "CAREN: 03 — Catálogo comercios BLOQUEADOS"
# OBJETIVO: Entrar a comercios bloqueados y verificar que NO se puede hacer pedido
# HARD: assertVisible "Comercio Bloqueado" confirma que realmente entró a uno bloqueado
# HARD: assertNotVisible "Finalizar/Confirmar Pedido" confirma que el pedido está bloqueado
---

# ─── COMERCIO BLOQUEADO 1 ───────────────────────────────────────────────────
- runFlow: helpers-filtro-bloqueado.yaml

- runFlow:
    when:
      visible:
        text: ".*[Bb]loqueado.*"
    commands:
      - tapOn:
          text: ".*[Bb]loqueado.*"
          index: 0
          optional: true
      - waitForAnimationToEnd
      - tapOn:
          text: ".*[Hh]acer [Pp]edido.*|.*[Cc]at[aá]logo.*|.*[Pp]roductos.*"
          optional: true
      - extendedWaitUntil:
          visible:
            text: ".*[Aa]gregar.*|.*[Cc]at[aá]logo.*|.*[Pp]roducto.*|.*[Ss]in.*productos.*|.*[Bb]loqueado.*|.*[Cc]ategor.*"
          timeout: 20000
      - swipe:
          direction: DOWN
          duration: 1500
      - swipe:
          direction: DOWN
          duration: 1500
      # HARD: el popup/banner "Comercio Bloqueado" debe aparecer
      - assertVisible:
          text: ".*[Cc]omercio [Bb]loqueado.*|.*[Bb]loqueado.*|Este comercio se encuentra bloqueado"
      # HARD: nunca debe ser posible finalizar un pedido en comercio bloqueado
      - assertNotVisible:
          text: ".*[Ff]inalizar [Pp]edido.*|.*[Cc]onfirmar [Pp]edido.*|.*[Ee]nviar [Pp]edido.*"
      - tapOn:
          text: ".*[Xx].*|.*[Cc]errar.*"
          optional: true
      - waitForAnimationToEnd
      - runFlow: helpers-volver-lista.yaml

