appId: ${APP_PACKAGE}
name: "CAREN: 02 — Pedido completo (staging — SE ENVÍA)"
# STAGING: se envía el pedido (diferente a producción donde se detiene antes de confirmar)
# Verifica: carrito funciona, precio sin IVA, sin descuento vendedor, se confirma exitosamente
---
- runFlow: helpers-filtro-disponible.yaml

# Entrar al primer comercio
- tapOn:
    text: ".*\\d{7,}.*"
    index: 0
    optional: true
- extendedWaitUntil:
    visible:
      text: "Continuar|.*[Hh]acer [Pp]edido.*|.*[Cc]at[aá]logo.*|.*[Tt]areas.*"
    timeout: 15000
- tapOn:
    text: "Continuar"
    optional: true
- waitForAnimationToEnd

- tapOn:
    text: ".*[Hh]acer [Pp]edido.*|.*[Cc]at[aá]logo.*|.*[Pp]roductos.*|Tomador de Pedido"
    optional: true
- waitForAnimationToEnd
- runFlow:
    when:
      visible:
        text: "Continuar"
    commands:
      - tapOn:
          text: "Continuar"
      - waitForAnimationToEnd
- tapOn:
    text: "Sugerencias"
    optional: true
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      text: ".*[Aa]gregar.*|.*[Cc]at[aá]logo.*|.*[Pp]roducto.*|Filtrar|Sugerencias|Tomador de Pedido"
    timeout: 20000

# Agregar primer producto al carro
- tapOn:
    text: ".*[Aa]gregar.*"
    index: 0
    optional: true
- waitForAnimationToEnd

# Verificar que NO hay descuento vendedor
- assertNotVisible:
    text: ".*[Dd]escuento [Vv]endedor.*|.*[Aa]plicar [Dd]escuento.*"
    optional: true

# Ir a "Mi pedido"
- tapOn:
    text: "Mi pedido"
    optional: true
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      text: ".*[Cc]onfirmar.*|.*[Rr]esumen.*|.*[Ee]nviar.*|.*[Tt]otal.*|.*[Mm]i pedido.*"
    timeout: 20000

# Verificar sin IVA incluido
- assertNotVisible:
    text: ".*IVA [Ii]ncluido.*|.*incl\\..*IVA.*"
    optional: true

# Seleccionar dirección si es requerida
- runFlow:
    when:
      visible:
        text: ".*[Ss]eleccione.*direcci[oó]n.*|.*[Dd]irecci[oó]n.*despacho.*"
    commands:
      - tapOn:
          text: ".*[Ss]eleccione.*direcci[oó]n.*|.*[Dd]irecci[oó]n.*despacho.*"
          optional: true
      - waitForAnimationToEnd
      - tapOn:
          text: ".*[Dd]irecci[oó]n.*"
          index: 0
          optional: true
      - waitForAnimationToEnd

# Seleccionar fecha de despacho si es requerida (enableAskDeliveryDate=true, shippingHook=true)
- swipe:
    direction: DOWN
    duration: 1000
- runFlow:
    when:
      visible:
        text: ".*[Ff]echa.*[Dd]espacho.*|.*[Ss]eleccionar.*[Ff]echa.*|.*[Ff]echa.*[Ee]ntr.*|No disponible.*Actualizar"
    commands:
      - tapOn:
          text: ".*[Ff]echa.*[Dd]espacho.*|.*[Ss]eleccionar.*[Ff]echa.*|No disponible.*Actualizar|.*Actualizar"
          optional: true
      - waitForAnimationToEnd
      - tapOn:
          text: ".*[Ll]unes.*|.*[Mm]artes.*|.*[Mm]i[eé]rcoles.*|.*[Jj]ueves.*|.*[Vv]iernes.*"
          index: 0
          optional: true
      - waitForAnimationToEnd
      - tapOn:
          text: ".*[Aa]ceptar.*|.*[Cc]onfirmar.*|.*[Oo][Kk].*|.*[Ll]isto.*"
          optional: true
      - waitForAnimationToEnd

- swipe:
    direction: UP
    duration: 1200
- swipe:
    direction: UP
    duration: 1200

# STAGING: finalizar y enviar el pedido
# HARD: si el botón no aparece el flow falla — el pedido debe poder enviarse
- tapOn:
    text: ".*[Ff]inalizar [Pp]edido.*|.*[Ee]nviar [Pp]edido.*|.*[Cc]onfirmar [Pp]edido.*"
- waitForAnimationToEnd

- runFlow:
    when:
      visible:
        text: ".*[Ee]st[aá]s seguro.*|.*ACEPTAR.*"
    commands:
      - tapOn:
          text: "ACEPTAR"
      - waitForAnimationToEnd

# HARD: confirmar que el pedido fue procesado exitosamente
- extendedWaitUntil:
    visible:
      text: ".*[Pp]edido.*[Ee]nviado.*|.*[Ee]xitoso.*|.*[Cc]onfirmado.*|.*[Gg]racias.*|.*[Pp]edido.*[Cc]reado.*|.*[Tt]u pedido.*|.*[Oo]rden.*creada.*|.*[Pp]edido.*recibido.*|.*[Pp]edido.*procesado.*|.*[Pp]edido.*#.*|Listado de comercios"
    timeout: 30000

- runFlow: helpers-volver-lista.yaml
