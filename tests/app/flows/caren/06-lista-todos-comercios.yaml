appId: ${APP_PACKAGE}
name: "CAREN: 06 — Lista completa de comercios (con scroll)"
# OBJETIVO: Documentar TODOS los comercios del vendedor (disponibles + bloqueados)
# con scroll completo de la lista para no perder los que no son visibles al inicio
---

# Startup: lanzar app y llegar a lista de comercios
- runFlow: helpers-startup.yaml

# Asegurar que no hay filtro activo
- runFlow: helpers-volver-lista.yaml

- swipe:
    direction: DOWN
    duration: 1500

- swipe:
    direction: DOWN
    duration: 1500

- swipe:
    direction: DOWN
    duration: 1500

# Ahora filtrar solo disponibles y hacer scroll completo
- runFlow: helpers-filtro-disponible.yaml

- swipe:
    direction: DOWN
    duration: 1500

- swipe:
    direction: DOWN
    duration: 1500

# Visitar TODOS los disponibles (hasta 4) y documentar cuántos productos tiene cada uno

# Disponible 1 — obligatorio
- runFlow: helpers-volver-lista.yaml
- runFlow: helpers-filtro-disponible.yaml

- tapOn:
    text: ".*[Dd]isponible.*"
    index: 0
    optional: true
- waitForAnimationToEnd

- runFlow:
    when:
      notVisible:
        text: "Seleccionar filtros"
    commands:
      - tapOn:
          text: ".*[Hh]acer [Pp]edido.*|.*[Cc]at[aá]logo.*|.*[Pp]roductos.*"
          optional: true
      - tapOn:
          text: "Sugerencias"
          optional: true
      - extendedWaitUntil:
          visible:
            text: ".*[Aa]gregar.*|.*[Cc]at[aá]logo.*|.*[Pp]roducto.*|.*[Ss]in.*productos.*|Filtrar|Sugerencias|Tomador de Pedido"
          timeout: 20000
      - swipe:
          direction: DOWN
          duration: 1500
      - swipe:
          direction: DOWN
          duration: 1500
      - swipe:
          direction: DOWN
          duration: 1500
      - runFlow: helpers-volver-lista.yaml

