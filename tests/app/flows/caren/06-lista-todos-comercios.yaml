appId: ${APP_PACKAGE}
name: "CAREN: 06 — Lista completa de comercios (con scroll)"
# OBJETIVO: Documentar TODOS los comercios del vendedor con scroll completo
# Usa IDs numéricos para entrar (no badges Disponible/Bloqueado por bug assignedSellers)
---

- runFlow: helpers-filtro-disponible.yaml

- swipe:
    direction: DOWN
    duration: 1500
- swipe:
    direction: DOWN
    duration: 1500
- swipe:
    direction: DOWN
    duration: 1500

# ─── Comercio 1 ────────────────────────────────────────────────────────────────
- runFlow: helpers-filtro-disponible.yaml

- tapOn:
    text: ".*\\d{7,}.*"
    index: 0
    optional: true
- waitForAnimationToEnd

- runFlow:
    when:
      notVisible:
        text: ".*Listado de comercios.*|Crear comercio"
    commands:
      - tapOn:
          text: ".*[Hh]acer [Pp]edido.*|.*[Cc]at[aá]logo.*|.*[Pp]roductos.*"
          optional: true
      - tapOn:
          text: "Sugerencias"
          optional: true
      - extendedWaitUntil:
          visible:
            text: ".*[Aa]gregar.*|.*[Cc]at[aá]logo.*|.*[Pp]roducto.*|.*[Ss]in.*productos.*|Filtrar|Sugerencias|Tomador de Pedido"
          timeout: 20000
      - swipe:
          direction: DOWN
          duration: 1500
      - swipe:
          direction: DOWN
          duration: 1500
      - swipe:
          direction: DOWN
          duration: 1500
      - runFlow: helpers-volver-lista.yaml

