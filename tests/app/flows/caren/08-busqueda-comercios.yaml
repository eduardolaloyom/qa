appId: ${APP_PACKAGE}
name: "CAREN: 08 — Búsqueda en lista de comercios"
# OBJETIVO: Verificar funcionalidad de búsqueda en la lista de comercios
# HALLAZGO original: lupa al costado derecho del header (coordenada 95%,6%)
# CAREN-QA-003 (P2): regresión detectada 2026-05-05 — coordenadas anteriores no activan búsqueda
# Estrategia: múltiples coordenadas + texto accesibilidad + swipe down para exponer search bar
---

- runFlow: helpers-startup.yaml
- runFlow: helpers-volver-lista.yaml

# Intento 1: lupa superior derecha (posición histórica)
- tapOn:
    point: "95%,6%"
    optional: true
- waitForAnimationToEnd

# Intento 2: lupa corrida hacia abajo
- runFlow:
    when:
      notVisible:
        text: ".*[Bb]uscar.*|.*[Ee]scribe.*|.*[Ii]ngresa.*|.*[Ff]iltrar.*|.*[Ss]earch.*"
    commands:
      - tapOn:
          point: "95%,8%"
          optional: true
      - waitForAnimationToEnd

# Intento 3: swipe down desde el top expone un search bar colapsado
- runFlow:
    when:
      notVisible:
        text: ".*[Bb]uscar.*|.*[Ee]scribe.*|.*[Ii]ngresa.*|.*[Ff]iltrar.*|.*[Ss]earch.*"
    commands:
      - swipe:
          direction: DOWN
          startY: "10%"
          endY: "30%"
          duration: 500
      - waitForAnimationToEnd

# Intento 4: texto accesibilidad "Buscar" directo
- runFlow:
    when:
      notVisible:
        text: ".*[Bb]uscar.*|.*[Ee]scribe.*|.*[Ii]ngresa.*|.*[Ff]iltrar.*|.*[Ss]earch.*"
    commands:
      - tapOn:
          text: ".*[Bb]uscar.*|[Ss]earch"
          optional: true
      - waitForAnimationToEnd

# Intento 5: lupa en esquina 90%,5% (variante de resolución)
- runFlow:
    when:
      notVisible:
        text: ".*[Bb]uscar.*|.*[Ee]scribe.*|.*[Ii]ngresa.*|.*[Ff]iltrar.*|.*[Ss]earch.*"
    commands:
      - tapOn:
          point: "90%,5%"
          optional: true
      - waitForAnimationToEnd

# HARD: si ningún intento encontró la barra de búsqueda → FAIL
- assertVisible:
    text: ".*[Bb]uscar.*|.*[Ee]scribe.*|.*[Ii]ngresa.*|.*[Ff]iltrar.*|.*[Ss]earch.*"

# Ejecutar búsqueda solo si se activó el campo
- runFlow:
    when:
      visible:
        text: ".*[Bb]uscar.*|.*[Ee]scribe.*|.*[Ii]ngresa.*|.*[Ff]iltrar.*|.*[Ss]earch.*"
    commands:
      - inputText: "MARIA"
      - waitForAnimationToEnd
      - swipe:
          direction: DOWN
          duration: 1000
      - tapOn:
          text: ".*[Ll]impiar.*|.*[Cc]errar.*|.*[Xx].*"
          optional: true
      - waitForAnimationToEnd
      - inputText: "0010001575"
      - waitForAnimationToEnd
      - tapOn:
          text: ".*[Ll]impiar.*|.*[Cc]errar.*|.*[Xx].*"
          optional: true
      - waitForAnimationToEnd

- runFlow: helpers-volver-lista.yaml
