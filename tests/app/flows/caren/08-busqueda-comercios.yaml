appId: ${APP_PACKAGE}
name: "CAREN: 08 — Búsqueda en lista de comercios"
# OBJETIVO: Verificar funcionalidad de búsqueda en la lista de comercios
# HALLAZGO: lupa está al costado derecho del header "Listado de comercios (D)"
# No es texto visible — es un ícono, se accede por coordenada extrema derecha del header
---

- runFlow: helpers-startup.yaml
- runFlow: helpers-volver-lista.yaml

# Tap en lupa: costado derecho del header "Listado de comercios (D)"
- tapOn:
    point: "95%,6%"
    optional: true
- waitForAnimationToEnd

# Fallback: un poco más abajo si el header está corrido
- runFlow:
    when:
      notVisible:
        text: ".*[Bb]uscar.*|.*[Ee]scribe.*|.*[Ii]ngresa.*|.*[Ff]iltrar.*|.*[Ss]earch.*"
    commands:
      - tapOn:
          point: "95%,8%"
          optional: true
      - waitForAnimationToEnd

# Solo ejecutar búsqueda si se activó el campo
- runFlow:
    when:
      visible:
        text: ".*[Bb]uscar.*|.*[Ee]scribe.*|.*[Ii]ngresa.*|.*[Ff]iltrar.*|.*[Ss]earch.*"
    commands:
      - inputText: "MARIA"
      - waitForAnimationToEnd
      - swipe:
          direction: DOWN
          duration: 1000
      - tapOn:
          text: ".*[Ll]impiar.*|.*[Cc]errar.*|.*[Xx].*"
          optional: true
      - waitForAnimationToEnd
      - inputText: "0010001575"
      - waitForAnimationToEnd
      - tapOn:
          text: ".*[Ll]impiar.*|.*[Cc]errar.*|.*[Xx].*"
          optional: true
      - waitForAnimationToEnd

- runFlow: helpers-volver-lista.yaml
