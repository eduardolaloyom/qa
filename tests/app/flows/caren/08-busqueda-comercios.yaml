appId: ${APP_PACKAGE}
name: "CAREN: 08 — Búsqueda en lista de comercios"
# OBJETIVO: Verificar funcionalidad de búsqueda en la lista de comercios
# Chequea: barra de búsqueda visible, resultados por nombre, por ID, limpieza de búsqueda
---

- runFlow: helpers-startup.yaml
- runFlow: helpers-volver-lista.yaml

# Intentar activar barra de búsqueda (texto o ícono)
- tapOn:
    text: ".*[Bb]uscar.*|.*[Ss]earch.*|.*[Ff]iltrar.*"
    optional: true
- waitForAnimationToEnd

# Fallback 1: ícono lupa top-right
- runFlow:
    when:
      notVisible:
        text: ".*[Bb]uscar.*|.*[Ee]scribe.*|.*[Ii]ngresa.*|.*[Ff]iltrar.*"
    commands:
      - tapOn:
          point: "85%,8%"
          optional: true
      - waitForAnimationToEnd

# Fallback 2: top-center
- runFlow:
    when:
      notVisible:
        text: ".*[Bb]uscar.*|.*[Ee]scribe.*|.*[Ii]ngresa.*|.*[Ff]iltrar.*"
    commands:
      - tapOn:
          point: "50%,8%"
          optional: true
      - waitForAnimationToEnd

# Solo ejecutar búsqueda si se activó el campo
- runFlow:
    when:
      visible:
        text: ".*[Bb]uscar.*|.*[Ee]scribe.*|.*[Ii]ngresa.*|.*[Ff]iltrar.*"
    commands:
      - inputText: "MARIA"
      - waitForAnimationToEnd
      - swipe:
          direction: DOWN
          duration: 1000
      - tapOn:
          text: ".*[Ll]impiar.*|.*[Cc]errar.*|.*[Xx].*"
          optional: true
      - waitForAnimationToEnd
      - inputText: "0010001575"
      - waitForAnimationToEnd
      - tapOn:
          text: ".*[Ll]impiar.*|.*[Cc]errar.*|.*[Xx].*"
          optional: true
      - waitForAnimationToEnd

- runFlow: helpers-volver-lista.yaml
