appId: ${APP_PACKAGE}
name: "CAREN: 28 — Geolocalización de vendedores"
# OBJETIVO: Verificar que la app solicita/usa GPS para validar visitas
# Alcance 3.9: "Validar visitas de vendedores mediante geolocalización"
# Config: useMobileGps: true
---
- runFlow: helpers-startup.yaml
- runFlow: helpers-filtro-disponible.yaml

- tapOn:
    text: ".*\\d{7,}.*"
    index: 0
    optional: true
- extendedWaitUntil:
    visible:
      text: "Continuar|.*[Hh]acer [Pp]edido.*|.*[Cc]at[aá]logo.*|.*[Uu]bicaci[oó]n.*|.*[Ll]ocalizaci[oó]n.*"
    timeout: 15000

# HARD ASSERT: indicador de GPS o solicitud de ubicación visible al entrar al comercio
- assertVisible:
    text: ".*[Uu]bicaci[oó]n.*|.*[Ll]ocalizaci[oó]n.*|.*[Gg][Pp][Ss].*|.*[Vv]isita.*[Cc]onfirmada.*|.*[Cc]heck.?[Ii]n.*"

- runFlow: helpers-volver-lista.yaml
