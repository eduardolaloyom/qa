appId: ${APP_PACKAGE}
name: "CAREN: 04 — Verificación features ON/OFF"
# Verifica que las features configuradas en MongoDB se reflejan en la app
# Staging caren.solopide.me config:
#   OFF: enableSellerDiscount, hasMultiUnitEnabled, enablePayments, enablePaymentsCollection,
#        commerce.enableCreateCommerce, useNewPromotions, loginButtons.facebook/google
#   ON:  enableCoupons, hasSingleDistributionCenter, editAddress
# NOTA: assertNotVisible son observaciones (optional) — no bloquean el flow
---

- runFlow: helpers-filtro-disponible.yaml

# ── Verificar que NO hay botón "Crear Comercio" (enableCreateCommerce: false) ──
- assertNotVisible:
    text: ".*[Cc]rear [Cc]omercio.*|.*[Nn]uevo [Cc]omercio.*|.*[Aa]gregar [Cc]omercio.*"
    optional: true

# ── Entrar a comercio disponible para verificar features en catálogo ───────────
- tapOn:
    text: ".*\\d{7,}.*"
    index: 0
    optional: true
- extendedWaitUntil:
    visible:
      text: "Continuar|.*[Hh]acer [Pp]edido.*|.*[Cc]at[aá]logo.*|.*[Tt]areas.*"
    timeout: 15000
- tapOn:
    text: "Continuar"
    optional: true
- waitForAnimationToEnd

- runFlow:
    when:
      visible:
        text: ".*Listado de comercios.*|Crear comercio"
    commands:
      - tapOn:
          text: ".*[Cc]omerci.*"
          index: 1
          optional: true
      - extendedWaitUntil:
          visible:
            text: "Continuar|.*[Hh]acer [Pp]edido.*|.*[Cc]at[aá]logo.*|.*[Tt]areas.*"
          timeout: 15000
      - tapOn:
          text: "Continuar"
          optional: true
      - waitForAnimationToEnd

- waitForAnimationToEnd

- tapOn:
    text: ".*[Hh]acer [Pp]edido.*|.*[Cc]at[aá]logo.*|.*[Pp]roductos.*"
    optional: true

- extendedWaitUntil:
    visible:
      text: ".*[Aa]gregar.*|.*[Cc]at[aá]logo.*|.*[Pp]roducto.*"
    timeout: 20000

# Sin multi-unidad (hasMultiUnitEnabled: false) — no debe haber selector UND/DIS
- assertNotVisible:
    text: ".*DIS.*|.*[Dd]isplay.*"
    optional: true

# Sin promo badge (useNewPromotions: false)
- assertNotVisible:
    text: ".*PROMO.*|.*%.*[Dd]escuento.*"
    optional: true

# Agregar producto para verificar carrito
- tapOn:
    text: ".*[Aa]gregar.*"
    index: 0
    optional: true

- waitForAnimationToEnd

# Sin descuento vendedor en carrito (enableSellerDiscount: false)
- assertNotVisible:
    text: ".*[Dd]escuento [Vv]endedor.*|.*[Aa]plicar [Dd]escuento.*"
    optional: true

- runFlow: helpers-volver-lista.yaml
