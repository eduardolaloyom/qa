appId: ${APP_PACKAGE}
name: "Verificación features ON/OFF — Caren (staging)"
# GENERADO AUTOMÁTICAMENTE por tools/gen-maestro-features.py
# Fuente: caren.solopide.me (variables MongoDB reales)
# Regenerar: python3 tools/gen-maestro-features.py <cliente>
---

# ── Login screen checks (antes de iniciar sesión) ────────────────
- launchApp:
    clearState: true
- waitForAnimationToEnd

# Botón login con Facebook — debe ser INVISIBLE (loginButtons.facebook: false)
- assertNotVisible:
    text: ".*[Ff]acebook.*|.*FB.*"

# Botón login con Google — debe ser INVISIBLE (loginButtons.google: false)
- assertNotVisible:
    text: ".*[Gg]oogle.*"

# ── Startup: llegar a lista de comercios ─────────────────────────
- runFlow: helpers-startup.yaml

# ── Lista de comercios ───────────────────────────────────────────
# Botón 'Crear Comercio' — debe ser VISIBLE (commerce.enableCreateCommerce: true)
- assertVisible:
    text: ".*[Cc]rear [Cc]omercio.*|Crear comercio"

# ── Entrar a comercio disponible ─────────────────────────────────
- runFlow: helpers-filtro-disponible.yaml
- tapOn:
    text: r'.*\d{7,}.*'
    index: 0
    optional: true
- extendedWaitUntil:
    visible:
      text: "Continuar|.*[Hh]acer [Pp]edido.*|.*[Cc]at[aá]logo.*"
    timeout: 15000
- tapOn:
    text: "Continuar"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: ".*[Hh]acer [Pp]edido.*|.*[Cc]at[aá]logo.*|.*[Pp]roductos.*"
    optional: true
- extendedWaitUntil:
    visible:
      text: ".*[Aa]gregar.*|.*[Cc]at[aá]logo.*|.*[Pp]roducto.*"
    timeout: 20000

# ── Catálogo: checks de features ─────────────────────────────────
# Selector DIS/UND (multi-unidad) — debe ser INVISIBLE (hasMultiUnitEnabled: false)
- assertNotVisible:
    text: ".*DIS.*|.*[Dd]isplay.*"

# ── Agregar producto al carrito ──────────────────────────────────
- tapOn:
    text: ".*[Aa]gregar.*"
    index: 0
    optional: true
- waitForAnimationToEnd

# ── Carrito: checks de features ──────────────────────────────────
# Opción 'Descuento Vendedor' — debe ser VISIBLE (enableSellerDiscount: true)
- assertVisible:
    text: ".*[Dd]escuento [Vv]endedor.*"

# ── Volver a lista ───────────────────────────────────────────────
- runFlow: helpers-volver-lista.yaml
