appId: ${APP_PACKAGE}
name: "CAREN: 12 — Fecha de despacho en checkout (enableAskDeliveryDate)"
# OBJETIVO: Verificar que el selector de fecha de despacho aparece en el carrito/checkout
# Config: enableAskDeliveryDate=true
# Alcance sec 4 (bloqueante): "Lógica configurable de fechas de despacho según CD y reglas de Caren"
# PASOS: 1. Login como vendedor | 2. Ir a lista de comercios | 3. Tap en comercio disponible → "Hacer Pedido" | 4. Agregar un producto al carrito | 5. Tap "Mi pedido" → ir al resumen del carrito | 6. Scroll hacia abajo | 7. Esperado: aparece selector de fecha de despacho | 8. Actual: el campo de fecha no aparece en el carrito
# NO envía el pedido — solo verifica que el campo es visible y operable
---

- runFlow: helpers-startup.yaml
- runFlow: helpers-filtro-disponible.yaml

- tapOn:
    text: ".*\\d{7,}.*"
    index: 0
    optional: true
- waitForAnimationToEnd

- tapOn:
    text: "Continuar"
    optional: true
- waitForAnimationToEnd

- tapOn:
    text: ".*[Hh]acer [Pp]edido.*|.*[Cc]at[aá]logo.*|.*[Pp]roductos.*|Tomador de Pedido"
    optional: true
- waitForAnimationToEnd

- tapOn:
    text: "Continuar"
    optional: true
- waitForAnimationToEnd

# Seleccionar CD si aparece
- runFlow: helpers-selector-cd.yaml

- extendedWaitUntil:
    visible:
      text: ".*[Aa]gregar.*|.*[Cc]at[aá]logo.*|.*[Pp]roducto.*|Filtrar|Sugerencias"
    timeout: 20000

- tapOn:
    text: ".*[Aa]gregar.*"
    index: 0
    optional: true
- waitForAnimationToEnd

- tapOn:
    text: "Mi pedido"
    optional: true
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      text: ".*[Cc]onfirmar.*|.*[Rr]esumen.*|.*[Ee]nviar.*|.*[Tt]otal.*|.*[Mm]i pedido.*"
    timeout: 20000

- swipe:
    direction: DOWN
    duration: 1200
- swipe:
    direction: DOWN
    duration: 1200

# HARD: selector de fecha debe aparecer en el carrito — bloqueante alcance sec. 4
- assertVisible:
    text: ".*[Ff]echa.*[Dd]espacho.*|.*[Ff]echa.*[Ee]ntr.*|.*[Dd][íi]a.*[Ee]ntr.*|.*[Ss]eleccionar.*[Ff]echa.*|.*[Ee]ntrega.*"

# Intentar abrir el picker de fecha
- runFlow:
    when:
      visible:
        text: ".*[Ff]echa.*[Dd]espacho.*|.*[Ff]echa.*[Ee]ntr.*|.*[Ss]eleccionar.*[Ff]echa.*|.*[Ee]ntrega.*"
    commands:
      - tapOn:
          text: ".*[Ff]echa.*[Dd]espacho.*|.*[Ss]eleccionar.*[Ff]echa.*|.*[Ff]echa.*|.*[Ee]ntrega.*"
          optional: true
      - waitForAnimationToEnd
      # Seleccionar primera fecha disponible
      - tapOn:
          text: ".*[Ll]unes.*|.*[Mm]artes.*|.*[Mm]i[eé]rcoles.*|.*[Jj]ueves.*|.*[Vv]iernes.*"
          index: 0
          optional: true
      - waitForAnimationToEnd
      - tapOn:
          text: ".*[Aa]ceptar.*|.*[Cc]onfirmar.*|.*[Oo][Kk].*|.*[Ll]isto.*"
          optional: true
      - waitForAnimationToEnd

# Volver sin finalizar el pedido
- pressKey: BACK
- waitForAnimationToEnd
- pressKey: BACK
- waitForAnimationToEnd

- runFlow: helpers-volver-lista.yaml
