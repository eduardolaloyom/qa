appId: ${APP_PACKAGE}
name: "CAREN: 01 — Catálogo comercios DISPONIBLES"
# OBJETIVO: documentar cuántos productos muestra cada comercio disponible
# Caren usa IDs numéricos (ej: 0010008876), no formato RUT
# Visita hasta 4 comercios; los que no existan se saltean automáticamente
---

# ─── COMERCIO 1 (obligatorio) ─────────────────────────────────────────────────
- runFlow: helpers-filtro-disponible.yaml

# Entrar al primer comercio (por ID numérico o por nombre)
- tapOn:
    text: ".*\\d{7,}.*"
    index: 0
    optional: true
- waitForAnimationToEnd

# Si no entramos, intentar vía cualquier tarjeta visible
- runFlow:
    when:
      visible:
        text: ".*Listado de comercios.*|Crear comercio"
    commands:
      - tapOn:
          text: ".*[Cc]omerci.*"
          index: 1
          optional: true
      - waitForAnimationToEnd

- tapOn:
    text: ".*[Hh]acer [Pp]edido.*|.*[Cc]at[aá]logo.*|.*[Pp]roductos.*|Tomador de Pedido"
    optional: true
- tapOn:
    text: "Sugerencias"
    optional: true
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      text: ".*[Aa]gregar.*|.*[Cc]at[aá]logo.*|.*[Pp]roducto.*|.*[Ss]in.*productos.*|.*[Cc]ategor.*|Filtrar|Sugerencias|Tomador de Pedido"
    timeout: 20000

- swipe:
    direction: DOWN
    duration: 1500
- swipe:
    direction: DOWN
    duration: 1500

- runFlow: helpers-volver-lista.yaml

# ─── COMERCIO 2 (condicional) ─────────────────────────────────────────────────
- tapOn:
    text: ".*\\d{7,}.*"
    index: 1
    optional: true
- waitForAnimationToEnd

- runFlow:
    when:
      notVisible:
        text: ".*Listado de comercios.*|Crear comercio"
    commands:
      - tapOn:
          text: ".*[Hh]acer [Pp]edido.*|.*[Cc]at[aá]logo.*|.*[Pp]roductos.*|Tomador de Pedido"
          optional: true
      - extendedWaitUntil:
          visible:
            text: ".*[Aa]gregar.*|.*[Cc]at[aá]logo.*|.*[Pp]roducto.*|.*[Ss]in.*productos.*|.*[Cc]ategor.*|Filtrar|Sugerencias|Tomador de Pedido"
          timeout: 20000
      - swipe:
          direction: DOWN
          duration: 1500
      - swipe:
          direction: DOWN
          duration: 1500
      - runFlow: helpers-volver-lista.yaml

