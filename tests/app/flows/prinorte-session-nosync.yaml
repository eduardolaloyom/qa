appId: ${APP_PACKAGE}
name: "PRINORTE: Sesión Completa (sin clearState)"
# Sesión completa sin limpiar estado Realm — no fuerza sync desde cero.
# Usar cuando la app ya tiene datos sincronizados (caso más común).
# Para sync limpio usar prinorte-session.yaml.
---

# ── Startup sin limpiar estado ────────────────────────────────────────────────
- launchApp

# Manejar login si la sesión expiró
- runFlow:
    when:
      visible:
        text: ".*[Ee]mail.*|.*[Cc]orreo.*"
    commands:
      - runFlow: helpers/login.yaml

# Descartar popup de nueva versión si aparece
- runFlow:
    when:
      visible:
        text: ".*ACTUALIZAR.*|.*[Nn]ueva.*versi[oó]n.*"
    commands:
      - tapOn:
          text: "CANCELAR"
          optional: true
      - waitForAnimationToEnd

# Esperar listado de comercios (datos ya sincronizados)
- extendedWaitUntil:
    visible:
      text: "Listado de comercios|.*[Cc]omercio.*"
    timeout: 20000

- waitForAnimationToEnd

# ── 01: Selección de comercio ─────────────────────────────────────────────────
- runFlow: prinorte/01-comercios.yaml

# ── 02: Catálogo ──────────────────────────────────────────────────────────────
- runFlow: prinorte/02-catalogo.yaml

# ── 03: Armar pedido (STOP antes de confirmar) ────────────────────────────────
- runFlow: prinorte/03-pedido.yaml

# ── 04: Filtros ───────────────────────────────────────────────────────────────
- runFlow: prinorte/04-filtros.yaml

# ── 05: Crear comercio (STOP antes de enviar) ─────────────────────────────────
- runFlow: prinorte/05-crear-comercio.yaml

# ── 06: Features OFF ──────────────────────────────────────────────────────────
- runFlow: prinorte/06-features-off.yaml

# ── 07: Comercio bloqueado ────────────────────────────────────────────────────
- runFlow: prinorte/07-bloqueado.yaml

# ── 08: Datos del comercio ────────────────────────────────────────────────────
- runFlow: prinorte/08-datos-comercio.yaml

# ── 09: Cuentas bancarias ─────────────────────────────────────────────────────
- runFlow: prinorte/09-cuentas.yaml

# ── 10: Historial de pedidos ──────────────────────────────────────────────────
- runFlow: prinorte/10-pedidos.yaml

# ── 11: Cobranza ──────────────────────────────────────────────────────────────
- runFlow: prinorte/11-cobranza.yaml

# ── 12: Precios y fotos ───────────────────────────────────────────────────────
- runFlow: prinorte/12-precios-fotos.yaml
