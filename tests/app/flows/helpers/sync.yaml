appId: ${APP_PACKAGE}
---
# Disparar sincronización
- tapOn:
    text: ".*SINCRONIZAR.*|.*[Ss]incronizar.*"
    optional: true

# Descartar popup "nueva versión" si apareció antes del sync
- runFlow:
    when:
      visible:
        text: ".*ACTUALIZAR.*|.*[Nn]ueva.*versi[oó]n.*"
    commands:
      - tapOn:
          text: "CANCELAR"
          optional: true
      - waitForAnimationToEnd

# Si aparece popup de error de sync, reintentar una vez
- runFlow:
    when:
      visible:
        text: ".*[Vv]olver a sincronizar.*"
    commands:
      - tapOn:
          text: "Volver a sincronizar"
      - waitForAnimationToEnd

# Si sigue fallando, seguir sin sincronizar (fallback definitivo)
- runFlow:
    when:
      visible:
        text: ".*[Ss]eguir sin sincronizar.*|.*[Vv]olver a sincronizar.*"
    commands:
      - tapOn:
          text: "Seguir sin sincronizar"
      - waitForAnimationToEnd

# Esperar que termine de sincronizar — 360s: dispositivo físico en red lenta puede tardar 3-4 min
# (el popup puede tener "CANCELAR" visible independientemente del estado del sync)
- extendedWaitUntil:
    notVisible:
      text: ".*[Ss]incronizando.*"
    timeout: 360000

# Descartar popup "nueva versión" que puede aparecer post-sync
- runFlow:
    when:
      visible:
        text: ".*ACTUALIZAR.*|.*[Nn]ueva.*versi[oó]n.*"
    commands:
      - tapOn:
          text: "CANCELAR"
          optional: true
      - waitForAnimationToEnd

# Confirmar que estamos en la lista de comercios
- extendedWaitUntil:
    visible:
      text: "Listado de comercios|.*ACTUALIZAR.*"
    timeout: 30000

# Dar tiempo a la UI para renderizar completamente
- waitForAnimationToEnd

# Segundo descarte si el popup reapareció
- runFlow:
    when:
      visible:
        text: ".*ACTUALIZAR.*|.*[Nn]ueva.*versi[oó]n.*"
    commands:
      - tapOn:
          text: "CANCELAR"
          optional: true
      - waitForAnimationToEnd
