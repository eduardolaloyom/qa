function renderTasksTable() {
  const tasks = DATA.tasks.filter(t => t.Tipo === 'Tarea' && t.Cliente);
  const allStates = ['progress','blocked','review','pending','done','archived'];
  const allPhases = DATA.phases || [];
  const allClients = DATA.clients || [];

  // Filters bar
  let h = '<div class="card" style="margin-bottom:16px;padding:16px 20px">';
  h += '<div style="display:flex;flex-wrap:wrap;gap:10px;align-items:center">';
  h += '<span style="font-weight:600;font-size:13px;color:var(--text-dim)">Filtros:</span>';
  h += '<select id="filter-estado" onchange="filterTasks()" style="padding:5px 10px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:12px"><option value="">Estado: Todos</option>';
  allStates.forEach(k => { h += `<option value="${k}">${stateLabel(k)}</option>`; });
  h += '</select>';
  h += '<select id="filter-cliente" onchange="filterTasks()" style="padding:5px 10px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:12px"><option value="">Cliente: Todos</option>';
  allClients.forEach(c => { h += `<option value="${c}">${c}</option>`; });
  h += '</select>';
  h += '<select id="filter-fase" onchange="filterTasks()" style="padding:5px 10px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:12px"><option value="">Fase: Todas</option>';
  allPhases.forEach(f => { h += `<option value="${f}">${f}</option>`; });
  h += '</select>';
  h += '<select id="filter-riesgo" onchange="filterTasks()" style="padding:5px 10px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:12px"><option value="">Riesgo: Todos</option><option value="overdue">Overdue</option><option value="soon">Próx. 0-3d</option><option value="upcoming">Próx. 4-7d</option><option value="ok">Al día</option></select>';
  h += '<button onclick="clearTaskFilters()" style="padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text-dim);font-size:12px;cursor:pointer">Limpiar</button>';
  h += '<span id="filter-count" style="font-size:12px;color:var(--text-dim);margin-left:auto"></span>';
  h += '</div></div>';

  // Accordion by client
  h += '<div id="tasks-accordion">';
  allClients.forEach((client, ci) => {
    const clientTasks = tasks.filter(t => t.Cliente === client).sort((a, b) => {
      const ai = DATA.phases.indexOf(a.Fase); const bi = DATA.phases.indexOf(b.Fase);
      return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
    });
    if (!clientTasks.length) return;
    const clientIdx = ci + 7;
    const color = DATA.clientColors[client] || 'var(--accent)';
    const activeCount = clientTasks.filter(t => {const k=stateKey(t.Estado); return k==='progress'||k==='blocked'||k==='review';}).length;
    const blockedCount = clientTasks.filter(t => stateKey(t.Estado)==='blocked').length;

    h += `<div class="card task-client-group" data-client="${client}" style="margin-bottom:12px;border-left:4px solid ${color};padding:0;overflow:hidden">`;
    // Header (clickable)
    h += `<div class="task-client-header" onclick="toggleTaskGroup('${client}')" style="padding:14px 20px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none">`;
    h += `<div style="display:flex;align-items:center;gap:12px">`;
    h += `<span class="task-chevron" id="chevron-${client}" style="font-size:12px;transition:transform .2s;color:var(--text-dim)">▶</span>`;
    h += `<strong style="font-size:14px">${client}</strong>`;
    h += `<span class="badge badge-gray" style="font-size:.7rem">${clientTasks.length} tareas</span>`;
    if (activeCount) h += `<span class="badge" style="background:rgba(99,102,241,.1);color:var(--accent);font-size:.7rem">${activeCount} activas</span>`;
    if (blockedCount) h += `<span class="badge badge-red" style="font-size:.7rem">${blockedCount} bloq.</span>`;
    h += `</div>`;
    h += `<span style="font-size:.75rem;color:var(--accent);font-weight:600" onclick="event.stopPropagation();showPage(${clientIdx})">Ver detalle →</span>`;
    h += `</div>`;
    // Body (hidden by default)
    h += `<div class="task-client-body" id="tbody-${client}" style="display:none;padding:0 20px 14px">`;
    h += '<div style="overflow-x:auto"><table style="margin:0"><thead><tr><th>Fase</th><th>Tarea</th><th>Estado</th><th>Riesgo</th><th>Inicio</th><th>Término</th><th>Cumpl.</th></tr></thead><tbody>';
    clientTasks.forEach(t => {
      const k = stateKey(t.Estado);
      const start = parseDate(t.FechaInicio);
      const end = parseDate(t.FechaTermino);
      let comp = 'N/A';
      if (start && end) {
        const planned = Math.max(diffDays(start, end), 1);
        if (k === 'done') comp = '100%';
        else if (k !== 'pending') {
          const actual = Math.max(diffDays(start, TODAY), 1);
          comp = Math.min(100, Math.round(planned / actual * 100)) + '%';
        } else comp = '-';
      }
      const bucket = dueBucket(t);
      const bk = bucket || 'ok';
      const dueBadge = bucket==='overdue' ? '<span class="badge badge-orange">Overdue</span>' : bucket==='soon' ? '<span class="badge badge-soon">Próx. 0–3d</span>' : bucket==='upcoming' ? '<span class="badge badge-upcoming">Próx. 4–7d</span>' : '<span class="badge badge-green">Al día</span>';
      h += `<tr class="task-row" data-client="${client}" data-estado="${k}" data-fase="${t.Fase||''}" data-riesgo="${bk}">`;
      h += `<td style="font-size:12px;white-space:nowrap">${t.Fase||'-'}</td>`;
      h += `<td>${t.Tarea}${t.Bloqueado ? '<br><span style="font-size:11px;color:var(--red)">' + t.Bloqueado.substring(0,80) + '</span>' : ''}</td>`;
      h += `<td><span class="badge" style="background:${stateBg(k)};color:${stateColor(k)}">${stateLabel(k)}</span></td>`;
      h += `<td>${dueBadge}</td>`;
      h += `<td style="font-size:12px">${t.FechaInicio||'-'}</td>`;
      h += `<td style="font-size:12px">${t.FechaTermino||'-'}</td>`;
      h += `<td style="font-weight:700;color:${comp==='N/A'||comp==='-'?'var(--text-dim)':parseInt(comp)>=100?'var(--green)':'var(--red)'}">${comp}</td>`;
      h += '</tr>';
    });
    h += '</tbody></table></div></div></div>';
  });
  h += '</div>';
  return h;
}

function toggleTaskGroup(client) {
  const body = document.getElementById('tbody-' + client);
  const chevron = document.getElementById('chevron-' + client);
  if (!body) return;
  const open = body.style.display !== 'none';
  body.style.display = open ? 'none' : 'block';
  if (chevron) chevron.style.transform = open ? '' : 'rotate(90deg)';
}

function filterTasks() {
  const estado = document.getElementById('filter-estado').value;
  const cliente = document.getElementById('filter-cliente').value;
  const fase = document.getElementById('filter-fase').value;
  const riesgo = document.getElementById('filter-riesgo').value;
  const rows = document.querySelectorAll('.task-row');
  let shown = 0, total = rows.length;
  // Open all groups if filtering
  const isFiltering = estado || cliente || fase || riesgo;
  document.querySelectorAll('.task-client-group').forEach(g => {
    const c = g.getAttribute('data-client');
    if (cliente && c !== cliente) { g.style.display = 'none'; return; }
    g.style.display = '';
    const body = g.querySelector('.task-client-body');
    const chevron = document.getElementById('chevron-' + c);
    if (isFiltering && body) { body.style.display = 'block'; if (chevron) chevron.style.transform = 'rotate(90deg)'; }
  });
  var visibleByClient = {};
  rows.forEach(r => {
    let show = true;
    if (estado && r.getAttribute('data-estado') !== estado) show = false;
    if (cliente && r.getAttribute('data-client') !== cliente) show = false;
    if (fase && r.getAttribute('data-fase') !== fase) show = false;
    if (riesgo) {
      const rv = r.getAttribute('data-riesgo');
      if (riesgo === 'ok' && (rv === 'overdue' || rv === 'soon' || rv === 'upcoming')) show = false;
      else if (riesgo !== 'ok' && rv !== riesgo) show = false;
    }
    r.style.display = show ? '' : 'none';
    if (show) { shown++; visibleByClient[r.getAttribute('data-client')] = true; }
  });
  // Hide client groups with no visible rows
  if (isFiltering) {
    document.querySelectorAll('.task-client-group').forEach(g => {
      const c = g.getAttribute('data-client');
      g.style.display = visibleByClient[c] ? '' : 'none';
    });
  }
  document.getElementById('filter-count').textContent = isFiltering ? shown + ' de ' + total + ' tareas' : '';
}

function clearTaskFilters() {
  ['filter-estado','filter-cliente','filter-fase','filter-riesgo'].forEach(id => { document.getElementById(id).value = ''; });
  document.querySelectorAll('.task-client-group').forEach(g => { g.style.display = ''; });
  document.querySelectorAll('.task-row').forEach(r => { r.style.display = ''; });
  document.querySelectorAll('.task-client-body').forEach(b => { b.style.display = 'none'; });
  document.querySelectorAll('.task-chevron').forEach(c => { c.style.transform = ''; });
  document.getElementById('filter-count').textContent = '';
}

function renderClientDetail(client) {
  const ts = clientTasks(client);
  const hs = healthScore(client);
  const pp = progressPct(client);
  const cp = compliancePct(client);
  const color = DATA.clientColors[client] || 'var(--accent)';

  let h = `<div class="card" style="border-left:4px solid ${color}">`;
  h += `<div style="display:flex;align-items:center;gap:16px;margin-bottom:16px">`;
  h += `<div class="gauge" style="background:${gaugeColor(hs)}">${hs}</div>`;
  h += `<div><div style="font-size:20px;font-weight:700">${client}</div>`;
  h += `<div style="font-size:13px;color:var(--text-dim)">${activePhase(client)||'Sin fase activa'}</div></div>`;
  h += `<div style="margin-left:auto;display:flex;gap:24px">`;
  h += `<div class="metric-item"><span class="num" style="color:var(--accent)">${pp}%</span><span class="lbl">Progreso</span></div>`;
  h += `<div class="metric-item"><span class="num" style="color:${complianceColor(cp)}">${cp!==null?cp+'%':'N/A'}</span><span class="lbl">Cumplimiento</span></div>`;
  h += `<div class="metric-item"><span class="num" style="color:${blockedCount(client)?'var(--red)':'var(--green)'}">${blockedCount(client)}</span><span class="lbl">Bloqueadas</span></div>`;
  h += `<div class="metric-item"><span class="num" style="color:${overdueCount(client)?'var(--orange)':'var(--green)'}">${overdueCount(client)}</span><span class="lbl">Overdue</span></div>`;
  h += `<div class="metric-item"><span class="num" style="color:${dueSoonCount(client)?'var(--yellow)':'var(--green)'}">${dueSoonCount(client)}</span><span class="lbl">Pr\u00f3x.</span></div>`;
  const dd = delayDays(client);
  h += `<div class="metric-item"><span class="num" style="color:${dd>0?'var(--red)':'var(--green)'}">${dd>0?dd+'d':'-'}</span><span class="lbl">Atraso</span></div>`;
  h += `</div></div></div>`;

  const firstActive = activePhase(client);

  const phases = [...new Set(ts.map(t => t.Fase).filter(Boolean))].sort((a, b) => {
    if (a === firstActive) return -1;
    if (b === firstActive) return 1;
    const ai = DATA.phases.indexOf(a);
    const bi = DATA.phases.indexOf(b);
    if (ai === -1 && bi === -1) return 0;
    if (ai === -1) return 1;
    if (bi === -1) return -1;
    return ai - bi;
  }).filter(phase => {
    const pt = ts.filter(t => t.Fase === phase);
    return !pt.every(t => stateKey(t.Estado) === 'done');
  });

  phases.forEach(phase => {
    const phaseTasks = ts.filter(t => t.Fase === phase);
    const taskPriority = t => {
      const k = stateKey(t.Estado);
      if (k === 'blocked') return 0;
      if (dueBucket(t) === 'overdue') return 1;
      if (k === 'progress') return 2;
      if (k === 'review') return 3;
      if (k === 'pending') return 4;
      return 5;
    };
    const activePhaseTasks = phaseTasks.filter(t => stateKey(t.Estado) !== 'done').sort((a, b) => taskPriority(a) - taskPriority(b));
    const doneCount = phaseTasks.length - activePhaseTasks.length;
    const phaseState = phaseStateForTasks(phaseTasks);
    const isFirst = phase === firstActive;
    h += `<div class="detail-section" style="${isFirst?'border:2px solid var(--accent);border-radius:12px;padding:16px;background:rgba(79,110,247,.04)':''}"><h3>${phase} <span class="badge" style="background:${stateBg(phaseState)};color:${stateColor(phaseState)};margin-left:8px">${stateLabel(phaseState)}</span>${isFirst?' <span class="badge badge-blue" style="margin-left:4px">Fase activa principal</span>':''}${doneCount?' <span style="font-size:11px;color:var(--text-dim);margin-left:8px">('+doneCount+' completada'+(doneCount!==1?'s':'')+')</span>':''}</h3>`;
    activePhaseTasks.forEach(t => {
      const k = stateKey(t.Estado);
      const bucket = dueBucket(t);
      h += `<div class="task-item" style="border-left:3px solid ${stateColor(k)};padding-left:10px">`;
      h += `<div class="task-item-header"><span class="task-item-name">${t.Tarea}</span><span class="badge" style="background:${stateBg(k)};color:${stateColor(k)}">${stateLabel(k)}</span>`;
      if (bucket === 'overdue') h += `<span class="badge" style="background:rgba(249,115,22,.15);color:var(--orange);margin-left:4px">Overdue</span>`;
      else if (bucket === 'soon') h += `<span class="badge" style="background:rgba(234,179,8,.15);color:var(--yellow);margin-left:4px">Vence pronto</span>`;
      h += `</div>`;
      if (t.Tipo && t.Tipo !== 'Tarea') h += `<div style="font-size:10px;color:var(--text-dim)">${t.Tipo}</div>`;
      if (t.FechaInicio || t.FechaTermino) h += `<div style="font-size:11px;color:var(--text-dim)">${t.FechaInicio||'?'} \u2192 ${t.FechaTermino||'?'}</div>`;
      if (t.Bloqueado) h += `<div style="font-size:12px;color:var(--red);margin-top:4px;font-weight:600">\u26d4 Bloqueado por: ${t.Bloqueado}</div>`;
      if (t.Responsables && t.Responsables.length) h += `<div style="margin-top:6px;display:flex;gap:4px;flex-wrap:wrap">${t.Responsables.map(r=>'<span class="badge badge-purple">'+r+'</span>').join('')}</div>`;
      h += '</div>';
    });
    h += '</div>';
  });

  return h;
}

function showPage(idx) {
  document.querySelectorAll('.page').forEach((p,i) => p.classList.toggle('active', i===idx));
  // Nav has 7 tabs (0-6); client detail pages (idx>=7) highlight "Clientes" tab (index 1)
  const navIdx = idx >= 7 ? 1 : idx;
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===navIdx));
  const topbar = document.querySelector('.topbar');
  const nav = document.getElementById('nav');
  if (idx === 6) {

    const f = document.getElementById('qa-frame');
    if (f && !f.getAttribute('src')) f.setAttribute('src', 'qa/index.html');
    resizeQaFrame();
  } else {
    if (topbar) topbar.style.display = '';
    if (nav) nav.style.display = '';
  }
}

function getActionable(text) {
  if (!text) return { label: 'Hacer seguimiento', color: 'var(--text-dim)' };
  var t = text.toLowerCase();
  if (/bug|cr[ií]tico|error|fix/.test(t))                          return { label: 'Resolver bugs', color: 'var(--blue)' };
  if (/reprogramado|go.live|nueva fecha|definir fecha/.test(t))    return { label: 'Definir fecha', color: 'var(--orange)' };
  if (/confirmaci[oó]n|plazos|confirmar/.test(t))                  return { label: 'Confirmar con cliente', color: 'var(--accent)' };
  if (/aprobaci[oó]n|ciberseguridad|infraestructura/.test(t))      return { label: 'Escalar aprobación', color: 'var(--red)' };
  if (/contrato|legal|prohibido|costo/.test(t))                    return { label: 'Decidir solución', color: 'var(--red)' };
  if (/api|endpoint|integraci[oó]n|implementar/.test(t))           return { label: 'Gestionar integración', color: 'var(--blue)' };
  if (/qa|prueba|testing|configuraci[oó]n/.test(t))                return { label: 'Revisar configuración', color: 'var(--yellow)' };
  if (/pendiente|aprobaci[oó]n|decisi[oó]n/.test(t))               return { label: 'Desbloquear pendiente', color: 'var(--orange)' };
  return { label: 'Hacer seguimiento', color: 'var(--text-dim)' };
}

function showKpiPopup(tipo) {
  var all = DATA.tasks.filter(function(t){ return t.Tipo === 'Tarea' && t.Cliente; }), tasks, title;
  if (tipo === 'activas') {
    tasks = all.filter(function(t){ return stateKey(t.Estado) === 'progress'; });
    title = 'Tareas Activas';
  } else if (tipo === 'bloqueadas') {
    tasks = all.filter(function(t){ return stateKey(t.Estado) === 'blocked'; });
    title = 'Tareas Bloqueadas';
  } else if (tipo === 'overdue') {
    tasks = all.filter(function(t){ return dueBucket(t) === 'overdue'; });
    title = 'Overdue';
  } else if (tipo === 'proximas') {
    tasks = all.filter(function(t){ return dueBucket(t) === 'soon'; });
    title = 'Próximas a vencer';
  } else return;
  document.getElementById('kpi-popup-title').textContent = title + ' (' + tasks.length + ')';
  // Group by client
  var grouped = {};
  tasks.forEach(function(t) {
    var c = t.Cliente || '?';
    if (!grouped[c]) grouped[c] = [];
    grouped[c].push(t);
  });
  var html = '';
  var popupIdCounter = 0;
  if (!tasks.length) {
    html = '<li style="color:var(--text-dim)">Sin tareas</li>';
  } else {
    Object.keys(grouped).sort().forEach(function(client) {
      var clientIdx = DATA.clients.indexOf(client);
      var pageIdx = clientIdx >= 0 ? clientIdx + 7 : -1;
      var gid = 'popup-grp-' + (popupIdCounter++);
      // Sort tasks by phase order
      grouped[client].sort(function(a, b) {
        var ai = DATA.phases.indexOf(a.Fase); var bi = DATA.phases.indexOf(b.Fase);
        return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
      });
      html += '<li class="tk-group-header" onclick="var b=document.getElementById(\'' + gid + '\');var o=b.style.display!==\'none\';b.style.display=o?\'none\':\'block\';this.querySelector(\'.tk-chev\').style.transform=o?\'\':\'rotate(90deg)\'" style="background:var(--surface2);font-weight:700;font-size:.85rem;padding:10px;border-radius:6px;margin-top:8px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none">';
      html += '<span><span class="tk-chev" style="font-size:10px;display:inline-block;transition:transform .2s;margin-right:6px">▶</span>' + client + ' <span class="badge badge-gray" style="font-size:.7rem;margin-left:4px">' + grouped[client].length + '</span></span>';
      if (pageIdx >= 0) html += '<span style="font-size:.7rem;color:var(--accent);cursor:pointer;font-weight:600" onclick="event.stopPropagation();closeKpiPopup();showPage(' + pageIdx + ')">Ver cliente →</span>';
      html += '</li>';
      html += '<div id="' + gid + '" style="display:none">';
      grouped[client].forEach(function(t, tidx) {
        var k = stateKey(t.Estado);
        var expandId = 'bl-' + gid + '-' + tidx;
        var action = getActionable(t.Bloqueado || '');
        html += '<li class="tk-task-block" style="padding-left:16px">';
        // Row 1: phase, name, badge, date
        html += '<div class="tk-task-row">';
        html += '<span class="tk-phase" style="font-size:.7rem;color:var(--text-dim);min-width:100px;flex-shrink:0">' + (t.Fase||'-') + '</span>';
        html += '<span class="tk-name">' + (t.Tarea||'—') + '</span>';
        html += '<span class="badge" style="background:' + stateBg(k) + ';color:' + stateColor(k) + ';font-size:.65rem;padding:2px 6px">' + stateLabel(k) + '</span>';
        if (t.FechaTermino) html += '<span class="tk-due">' + t.FechaTermino + '</span>';
        html += '</div>';
        // Row 2: bloqueo text (if any) + action chip
        if (t.Bloqueado) {
          html += '<div class="tk-bloqueado">';
          html += '🚫 <span id="' + expandId + '" class="tk-bloqueado-text">' + t.Bloqueado + '</span>';
          html += '<button class="tk-expand-btn" onclick="(function(el,btn){if(el.classList.contains(\'expanded\')){el.classList.remove(\'expanded\');btn.textContent=\'ver más\'}else{el.classList.add(\'expanded\');btn.textContent=\'ver menos\'}})(document.getElementById(\'' + expandId + '\'),this)">ver más</button>';
          html += '</div>';
        }
        html += '<div><span class="tk-action-chip" style="color:' + action.color + '">' + action.label + '</span></div>';
        html += '</li>';
      });
      html += '</div>';
    });
  }
  document.getElementById('kpi-popup-list').innerHTML = html;
  document.getElementById('kpi-popup-overlay').style.display = 'flex';
}
function closeKpiPopup() {
  document.getElementById('kpi-popup-overlay').style.display = 'none';
}

function resizeQaFrame() {
  const frame = document.getElementById('qa-frame');
  if (!frame) return;
  const topbar = document.querySelector('.topbar');
  const nav = document.getElementById('nav');
  const used = (topbar ? topbar.offsetHeight : 0) + (nav ? nav.offsetHeight : 0);
  frame.style.height = (window.innerHeight - used) + 'px';
}
window.addEventListener('resize', resizeQaFrame);

// Init
render();
</script>
<div id="kpi-popup-overlay" class="kpi-popup-overlay" style="display:none" onclick="if(event.target===this)closeKpiPopup()"><div class="kpi-popup-box"><h3 id="kpi-popup-title"></h3><ul class="kpi-popup-list" id="kpi-popup-list"></ul><button class="kpi-popup-close" onclick="closeKpiPopup()">× Cerrar</button></div></div>
</body>
</html>
