name: Playwright Tests → GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'tests/e2e/**'
      - '.github/workflows/playwright.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test-codelpa:
    name: 'Codelpa E2E'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        node-version: [18.x]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Codelpa tests
        env:
          BASE_URL: https://beta-codelpa.solopide.me
          ADMIN_URL: https://admin-codelpa.solopide.me
        run: |
          cd tests/e2e
          npx playwright test --project=b2b b2b/codelpa.spec.ts --reporter=html --reporter=json

      - name: Upload Codelpa report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codelpa-report
          path: tests/e2e/playwright-report/
          retention-days: 30

  test-surtiventas:
    name: 'Surtiventas E2E'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        node-version: [18.x]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Surtiventas tests
        env:
          BASE_URL: https://surtiventas.solopide.me
          ADMIN_URL: https://admin-surtiventas.solopide.me
        run: |
          cd tests/e2e
          npx playwright test --project=b2b b2b/surtiventas.spec.ts --reporter=html --reporter=json

      - name: Upload Surtiventas report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surtiventas-report
          path: tests/e2e/playwright-report/
          retention-days: 30

  publish:
    name: 'Publish to GitHub Pages'
    needs: [test-codelpa, test-surtiventas]
    if: always()
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Download Codelpa report
        uses: actions/download-artifact@v4
        with:
          name: codelpa-report
          path: public/codelpa

      - name: Download Surtiventas report
        uses: actions/download-artifact@v4
        with:
          name: surtiventas-report
          path: public/surtiventas

      - name: Create dashboard index
        run: |
          mkdir -p public
          cat > public/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="es">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>YOM QA Dashboard — Playwright E2E</title>
            <style>
              * { margin: 0; padding: 0; box-sizing: border-box; }
              body {
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                min-height: 100vh;
                padding: 2rem;
              }
              .container { max-width: 1200px; margin: 0 auto; }
              header {
                text-align: center;
                color: white;
                margin-bottom: 3rem;
              }
              h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
              .subtitle { font-size: 1.1rem; opacity: 0.9; }
              .grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
                gap: 2rem;
                margin-bottom: 3rem;
              }
              .card {
                background: white;
                border-radius: 12px;
                overflow: hidden;
                box-shadow: 0 10px 40px rgba(0,0,0,0.2);
                transition: transform 0.3s, box-shadow 0.3s;
              }
              .card:hover { transform: translateY(-5px); box-shadow: 0 15px 50px rgba(0,0,0,0.3); }
              .card-header {
                padding: 1.5rem;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                color: white;
              }
              .card-title { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.25rem; }
              .card-status {
                font-size: 0.9rem;
                opacity: 0.9;
                margin-top: 0.5rem;
              }
              .card-body {
                padding: 1.5rem;
              }
              .status-badge {
                display: inline-block;
                padding: 0.5rem 1rem;
                border-radius: 20px;
                font-size: 0.9rem;
                font-weight: 600;
                margin-bottom: 1rem;
              }
              .status-pass { background: #d4edda; color: #155724; }
              .status-fail { background: #f8d7da; color: #721c24; }
              .status-warning { background: #fff3cd; color: #856404; }
              .metrics {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 1rem;
                margin-bottom: 1.5rem;
              }
              .metric {
                background: #f8f9fa;
                padding: 1rem;
                border-radius: 8px;
              }
              .metric-value { font-size: 1.5rem; font-weight: 600; color: #667eea; }
              .metric-label { font-size: 0.85rem; color: #666; margin-top: 0.25rem; }
              .btn {
                display: inline-block;
                padding: 0.75rem 1.5rem;
                background: #667eea;
                color: white;
                text-decoration: none;
                border-radius: 6px;
                font-weight: 600;
                transition: background 0.3s;
                margin-top: 1rem;
              }
              .btn:hover { background: #764ba2; }
              .btn-secondary { background: #6c757d; }
              .btn-secondary:hover { background: #5a6268; }
              .footer {
                text-align: center;
                color: white;
                margin-top: 3rem;
                font-size: 0.9rem;
                opacity: 0.8;
              }
              .last-update { color: white; opacity: 0.7; font-size: 0.85rem; margin-top: 1rem; }
            </style>
          </head>
          <body>
            <div class="container">
              <header>
                <h1>🧪 YOM QA Dashboard</h1>
                <p class="subtitle">Playwright E2E Tests — B2B Platform</p>
              </header>

              <div class="grid">
                <div class="card">
                  <div class="card-header">
                    <div class="card-title">Codelpa</div>
                    <div class="card-status">beta-codelpa.solopide.me</div>
                  </div>
                  <div class="card-body">
                    <div class="status-badge status-warning">⚠️ CON CONDICIONES</div>
                    <div class="metrics">
                      <div class="metric">
                        <div class="metric-value">72/100</div>
                        <div class="metric-label">Health Score</div>
                      </div>
                      <div class="metric">
                        <div class="metric-value">2</div>
                        <div class="metric-label">HIGH abiertos</div>
                      </div>
                    </div>
                    <p style="color: #666; font-size: 0.9rem; margin-bottom: 1rem;">
                      <strong>Issues:</strong> #7 (número pedido), #1 (delivery-date API), #8 (cupón)
                    </p>
                    <a href="./codelpa/index.html" class="btn">Ver reporte completo</a>
                  </div>
                </div>

                <div class="card">
                  <div class="card-header">
                    <div class="card-title">Surtiventas</div>
                    <div class="card-status">surtiventas.solopide.me</div>
                  </div>
                  <div class="card-body">
                    <div class="status-badge status-fail">🔴 NO APTO</div>
                    <div class="metrics">
                      <div class="metric">
                        <div class="metric-value">45/100</div>
                        <div class="metric-label">Health Score</div>
                      </div>
                      <div class="metric">
                        <div class="metric-value">1</div>
                        <div class="metric-label">CRÍTICO</div>
                      </div>
                    </div>
                    <p style="color: #666; font-size: 0.9rem; margin-bottom: 1rem;">
                      <strong>Bloqueador:</strong> SV-QA-001 (shippingAddress null → HTTP 400)
                    </p>
                    <a href="./surtiventas/index.html" class="btn">Ver reporte completo</a>
                  </div>
                </div>
              </div>

              <div style="background: rgba(255,255,255,0.1); border-radius: 12px; padding: 2rem; color: white; margin-bottom: 2rem;">
                <h2 style="margin-bottom: 1rem;">📋 Estado General</h2>
                <ul style="margin-left: 1.5rem; line-height: 1.8;">
                  <li><strong>Codelpa:</strong> Puede ir a staging con monitoring (P0/P1 pendientes)</li>
                  <li><strong>Surtiventas:</strong> Bloqueado en P0 (SV-QA-001) — requiere investigación inmediata</li>
                  <li><strong>Plataforma:</strong> Issues compartidas en cupones e imágenes (QA-008, QA-004)</li>
                </ul>
                <p class="last-update">⏱️ Último actualizado: <span id="update-time"></span></p>
              </div>

              <div class="footer">
                <p>YOM B2B QA — Powered by Playwright + GitHub Actions</p>
                <p style="margin-top: 0.5rem;">Para reportes detallados, ver <a href="https://github.com/eduardolaloyom/qa/blob/main/REPORTE-QA-ACCIONABLE-2026-03-31.md" style="color: white; text-decoration: underline;">REPORTE-QA-ACCIONABLE-2026-03-31.md</a></p>
              </div>
            </div>

            <script>
              document.getElementById('update-time').textContent = new Date().toLocaleString('es-CL', {
                dateStyle: 'short',
                timeStyle: 'short',
                timeZone: 'America/Santiago'
              });
            </script>
          </body>
          </html>
          EOF

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'public'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2
