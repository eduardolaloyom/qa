name: Update PeM Dashboard

on:
  schedule:
    - cron: '*/10 12-21 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests python-dateutil

      - name: Generate PeM dashboard
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKENV1 }}
        run: python generate_dashboard.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/index.html pattern_history.json
          git diff --cached --quiet || git commit -m "Update PeM dashboard $(date -u +%Y-%m-%d_%H:%M)"
          git pull --rebase && git push

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          keep_files: true
