name: Playwright E2E Tests — Nightly

on:
  schedule:
    # 2 AM UTC = 11 PM Chile (previous day)
    - cron: '0 2 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        run: |
          npm install
          cd tests/e2e && npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Codelpa tests
        env:
          BASE_URL: https://beta-codelpa.solopide.me
          CODELPA_EMAIL: ${{ secrets.CODELPA_EMAIL }}
          CODELPA_PASSWORD: ${{ secrets.CODELPA_PASSWORD }}
        working-directory: tests/e2e
        run: |
          rm -rf playwright-report
          npx playwright test --project=b2b --grep="^Codelpa" --reporter=html,"./reporters/grouped-report.ts",list

      - name: Copy Codelpa results
        if: always()
        run: |
          mkdir -p public/codelpa
          cp -r tests/e2e/playwright-report/* public/codelpa/

      - name: Run Surtiventas tests
        env:
          BASE_URL: https://surtiventas.solopide.me
          SURTIVENTAS_EMAIL: ${{ secrets.SURTIVENTAS_EMAIL }}
          SURTIVENTAS_PASSWORD: ${{ secrets.SURTIVENTAS_PASSWORD }}
        working-directory: tests/e2e
        run: |
          rm -rf playwright-report
          npx playwright test --project=b2b --grep="^Surtiventas" --reporter=html,"./reporters/grouped-report.ts",list

      - name: Copy Surtiventas results
        if: always()
        run: |
          mkdir -p public/surtiventas
          cp -r tests/e2e/playwright-report/* public/surtiventas/

      - name: Update dashboard timestamp
        if: always()
        run: |
          TIMESTAMP=$(date '+%d de %B de %Y · %H:%M %Z' -d @$(date +%s))
          sed -i "s|⏱️ Último ejecutado: .*|⏱️ Último ejecutado: ${TIMESTAMP}|" public/index.html

      - name: Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
