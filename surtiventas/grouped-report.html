
      <!DOCTYPE html>
      <html lang="es">
      <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>YOM QA — Grouped Test Report</title>
        <style>
          * { margin: 0; padding: 0; box-sizing: border-box; }
          body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            padding: 2rem;
          }
          .container { max-width: 1200px; margin: 0 auto; }
          header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem;
            border-radius: 8px;
            margin-bottom: 2rem;
          }
          header h1 { font-size: 2rem; margin-bottom: 1rem; }
          .summary {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-top: 1rem;
          }
          .summary-item {
            background: rgba(255,255,255,0.2);
            padding: 1rem;
            border-radius: 6px;
            text-align: center;
          }
          .summary-item strong { font-size: 1.5rem; display: block; }
          .summary-item span { font-size: 0.9rem; opacity: 0.9; }

          .type-section {
            background: white;
            border-radius: 8px;
            margin-bottom: 2rem;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
          }
          .type-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 1.5rem;
            border-left: 6px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
          }
          .type-header h2 { font-size: 1.5rem; font-weight: 700; }
          .stats {
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
          }

          .feature-group {
            padding: 1.5rem;
            border-bottom: 1px solid #eee;
            background: #fafafa;
          }
          .feature-group:last-child { border-bottom: none; background: white; }
          .feature-group h3 {
            font-size: 1.1rem;
            margin-bottom: 1rem;
            color: #333;
            font-weight: 600;
          }

          .tests {
            list-style: none;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1rem;
          }
          .test {
            padding: 1rem;
            border-radius: 6px;
            background: #f8f9fa;
            border-left: 3px solid #ccc;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.9rem;
          }
          .test.passed {
            border-left-color: #28a745;
            background: #f0f9f6;
          }
          .test.failed {
            border-left-color: #dc3545;
            background: #fef5f6;
          }
          .test.skipped {
            border-left-color: #ffc107;
            background: #fffef5;
          }

          .status-icon {
            font-weight: bold;
            font-size: 1.1rem;
          }
          .test.passed .status-icon { color: #28a745; }
          .test.failed .status-icon { color: #dc3545; }
          .test.skipped .status-icon { color: #ffc107; }

          .test-title {
            flex: 1;
            color: #333;
          }
          .duration {
            background: rgba(0,0,0,0.05);
            padding: 0.25rem 0.75rem;
            border-radius: 4px;
            font-size: 0.8rem;
            color: #666;
            white-space: nowrap;
          }

          .error {
            grid-column: 1 / -1;
            background: #fff3cd;
            padding: 1rem;
            border-radius: 4px;
            font-size: 0.8rem;
            color: #333;
            margin-top: 0.5rem;
            overflow-x: auto;
            border-left: 3px solid #ffc107;
          }

          footer {
            text-align: center;
            color: #999;
            font-size: 0.85rem;
            margin-top: 3rem;
          }
        </style>
      </head>
      <body>
        <div class="container">
          <header>
            <h1>🧪 Grouped Test Report</h1>
            <div class="summary">
              <div class="summary-item">
                <strong>0</strong>
                <span>Total Tests</span>
              </div>
              <div class="summary-item">
                <strong>0</strong>
                <span>Passed</span>
              </div>
              <div class="summary-item">
                <strong>0</strong>
                <span>Failed</span>
              </div>
              <div class="summary-item">
                <strong>0</strong>
                <span>Skipped</span>
              </div>
            </div>
          </header>

          

          <footer>
            Generated on 01-04-2026, 9:56:15 a. m.
          </footer>
        </div>
      </body>
      </html>
